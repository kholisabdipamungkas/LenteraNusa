<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Detail Artikel | LenteraNusa</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter', sans-serif; background:#F8FAFC; color:#0F172A; }
    :root { 
      --primary:#5B21B6; 
      --primary-dark:#4C1D95; 
      --secondary:#2563EB;
      --gray-100:#F1F5F9;
      --gray-200:#E2E8F0; 
      --gray-600:#475569; 
      --gray-800:#1E293B;
      --card-bg:#FFFFFF; 
      --shadow-sm:0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md:0 4px 6px -1px rgb(0 0 0 / 0.1);
      --border-radius-card:20px;
    }
    .app { display: flex; min-height: 100vh; }
    .sidebar { 
      width:280px; background:var(--card-bg); border-right:1px solid var(--gray-200);
      position:fixed; top:0; bottom:0; left:0; z-index:50; transition:transform 0.2s ease;
      overflow-y:auto; padding:1.5rem; 
    }
    .sidebar-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:2rem; padding-bottom:1rem; border-bottom:1px solid var(--gray-200); }
    .logo-icon { background:linear-gradient(135deg,var(--primary),var(--secondary)); width:36px; height:36px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:white; }
    .logo-text { font-family:'Poppins'; font-weight:700; font-size:1.25rem; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .sidebar-menu { list-style:none; margin-top:1rem; }
    .sidebar-menu li { margin-bottom:0.25rem; }
    .sidebar-menu a { display:flex; align-items:center; gap:0.75rem; padding:0.75rem 1rem; border-radius:12px; color:var(--gray-600); font-weight:500; text-decoration:none; transition:all 0.2s; }
    .sidebar-menu a:hover { background:var(--gray-100); color:var(--primary); }
    .sidebar-menu .active a { background:#EEF2FF; color:var(--primary); }
    .sidebar-menu i { width:1.25rem; }
    .main-content { flex:1; margin-left:280px; padding:2rem; }
    .hamburger { display:none; position:fixed; top:1rem; left:1rem; z-index:60; background:white; border:none; font-size:1.5rem; padding:0.5rem; border-radius:12px; cursor:pointer; box-shadow:var(--shadow-sm); }
    
    .back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--gray-600); text-decoration: none; margin-bottom: 1.5rem; transition: 0.2s; }
    .back-link:hover { color: var(--primary); }
    
    .article-header { margin-bottom: 1.5rem; }
    .article-category { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.7rem; background: #EEF2FF; color: var(--primary); margin-bottom: 1rem; }
    .article-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 1rem; line-height: 1.3; }
    .article-meta { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; padding-bottom: 1rem; border-bottom: 1px solid var(--gray-200); margin-bottom: 1.5rem; }
    .article-meta-item { display: flex; align-items: center; gap: 0.5rem; color: var(--gray-600); font-size: 0.875rem; }
    
    .article-content { line-height: 1.8; font-size: 1rem; color: var(--gray-800); }
    .article-content p { margin-bottom: 1rem; }
    .article-image { border-radius: var(--border-radius-card); min-height: 200px; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; font-size: 4rem; }
    
    .share-section { margin: 2rem 0; padding: 1rem 0; border-top: 1px solid var(--gray-200); border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .share-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .share-btn { padding: 0.5rem 1rem; border-radius: 40px; text-decoration: none; font-size: 0.8rem; font-weight: 500; display: inline-flex; align-items: center; gap: 0.5rem; transition: 0.2s; }
    .share-btn:hover { transform: scale(1.02); opacity: 0.9; }
    .share-wa { background: #25D366; color: white; }
    .share-fb { background: #1877F2; color: white; }
    .share-twitter { background: #1DA1F2; color: white; }
    
    .comments-section { margin-top: 2rem; }
    .comments-title { font-size: 1.3rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .comment-item { background: var(--gray-100); border-radius: 16px; padding: 1rem; margin-bottom: 1rem; transition: 0.2s; }
    .comment-item:hover { background: #E8EDF5; }
    .comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; flex-wrap: wrap; }
    .comment-name { font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
    .comment-name i { color: var(--primary); }
    .comment-date { font-size: 0.7rem; color: var(--gray-600); }
    .comment-text { color: var(--gray-700); line-height: 1.5; }
    .comment-form { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--gray-200); }
    .comment-form textarea { width: 100%; padding: 1rem; border: 1px solid var(--gray-200); border-radius: 16px; resize: vertical; font-family: inherit; font-size: 0.875rem; margin-bottom: 1rem; transition: 0.2s; }
    .comment-form textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(91,33,182,0.1); }
    .btn-submit { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 40px; cursor: pointer; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; }
    .btn-submit:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(91,33,182,0.3); }
    
    .related-section { margin-top: 2rem; }
    .related-title { font-size: 1.3rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
    .related-card { background: white; border-radius: 16px; padding: 1rem; border: 1px solid var(--gray-200); transition: 0.2s; text-decoration: none; display: block; text-align: center; }
    .related-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
    .related-card .icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .related-card h4 { color: var(--gray-800); margin-bottom: 0.5rem; font-size: 0.9rem; }
    .related-card p { font-size: 0.7rem; color: var(--gray-600); }
    
    .empty-comment { text-align: center; padding: 2rem; color: var(--gray-600); background: var(--gray-100); border-radius: 16px; }
    
    @media (max-width:768px) {
      .sidebar { transform: translateX(-100%); width:260px; }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left:0; padding:1.5rem; padding-top:4rem; }
      .hamburger { display:block; }
      .article-title { font-size: 1.4rem; }
      .article-meta { gap: 0.8rem; }
      .share-section { flex-direction: column; align-items: flex-start; }
      .related-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <a href="artikel.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Artikel</a>
    <div id="articleDetail"></div>
  </main>
</div>

<script>
  const currentUser = JSON.parse(localStorage.getItem('currentUser'));
  if (!currentUser || currentUser.role !== 'siswa') window.location = 'login.html';
  
  const urlParams = new URLSearchParams(window.location.search);
  const articleId = parseInt(urlParams.get('id'));
  let articles = JSON.parse(localStorage.getItem('articles')) || [];
  const article = articles.find(a => a.id === articleId);
  
  let comments = JSON.parse(localStorage.getItem('articleComments')) || {};
  let articleComments = comments[articleId] || [];
  
  function saveComments() {
    comments[articleId] = articleComments;
    localStorage.setItem('articleComments', JSON.stringify(comments));
  }
  
  function renderComments() {
    const container = document.getElementById('commentsList');
    if (!container) return;
    
    if (articleComments.length === 0) {
      container.innerHTML = '<div class="empty-comment"><i class="fas fa-comments" style="font-size: 2rem; margin-bottom: 0.5rem; display: block;"></i>Belum ada komentar. Jadilah yang pertama!</div>';
      return;
    }
    
    let commentsHtml = '';
    articleComments.forEach((c) => {
      commentsHtml += `
        <div class="comment-item">
          <div class="comment-header">
            <div class="comment-name">
              <i class="fas fa-user-circle"></i> ${escapeHtml(c.name)}
            </div>
            <div class="comment-date">
              <i class="far fa-calendar-alt"></i> ${c.date}
            </div>
          </div>
          <div class="comment-text">${escapeHtml(c.text)}</div>
        </div>
      `;
    });
    container.innerHTML = commentsHtml;
  }
  
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
  
  function getCategoryColor(category) {
    const colors = {
      'Tips Belajar': 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
      'Motivasi': 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
      'Teknologi Pendidikan': 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
      'Pengembangan Diri': 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
      'Literasi': 'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)'
    };
    return colors[category] || 'linear-gradient(135deg, var(--primary), var(--secondary))';
  }
  
  if (!article) {
    document.getElementById('articleDetail').innerHTML = `
      <div style="background: white; border-radius: var(--border-radius-card); padding: 2rem; text-align: center;">
        <i class="fas fa-newspaper" style="font-size: 3rem; color: var(--gray-600);"></i>
        <h2 style="margin: 1rem 0;">Artikel tidak ditemukan</h2>
        <a href="artikel.html" class="btn-submit">Kembali ke Artikel</a>
      </div>
    `;
  } else {
    // Update views
    article.views = (article.views || 0) + 1;
    const articleIndex = articles.findIndex(a => a.id === articleId);
    if (articleIndex !== -1) {
      articles[articleIndex].views = article.views;
      localStorage.setItem('articles', JSON.stringify(articles));
    }
    
    let contentHtml = '';
    if (article.content) {
      const paragraphs = article.content.split('\n\n');
      paragraphs.forEach(p => {
        if (p.trim()) {
          contentHtml += `<p>${escapeHtml(p.trim())}</p>`;
        }
      });
    }
    
    // Artikel terkait
    let relatedArticles = articles.filter(a => a.category === article.category && a.id !== article.id).slice(0, 3);
    let relatedHtml = '';
    if (relatedArticles.length > 0) {
      relatedHtml = `
        <div class="related-section">
          <div class="related-title">
            <i class="fas fa-link" style="color: var(--primary);"></i> 
            Artikel Terkait
          </div>
          <div class="related-grid">
            ${relatedArticles.map(rel => `
              <a href="detail-artikel.html?id=${rel.id}" class="related-card">
                <div class="icon">${rel.icon || '📚'}</div>
                <h4>${escapeHtml(rel.title)}</h4>
                <p><i class="fas fa-eye"></i> ${(rel.views || 0).toLocaleString()} dibaca</p>
              </a>
            `).join('')}
          </div>
        </div>
      `;
    }
    
    document.getElementById('articleDetail').innerHTML = `
      <div style="background: white; border-radius: var(--border-radius-card); border: 1px solid var(--gray-200); overflow: hidden;">
        <div class="article-image" style="background: ${getCategoryColor(article.category)};">
          <span>${article.icon || '📚'}</span>
        </div>
        <div style="padding: 2rem;">
          <div class="article-header">
            <div class="article-category">${article.category}</div>
            <h1 class="article-title">${escapeHtml(article.title)}</h1>
            <div class="article-meta">
              <div class="article-meta-item"><i class="fas fa-user"></i> ${escapeHtml(article.author)}</div>
              <div class="article-meta-item"><i class="far fa-calendar-alt"></i> ${article.date}</div>
              <div class="article-meta-item"><i class="fas fa-eye"></i> ${(article.views || 0).toLocaleString()} dibaca</div>
            </div>
          </div>
          
          <div class="article-content">
            ${contentHtml || `<p>${escapeHtml(article.content || 'Selamat membaca artikel ini. Semoga menambah wawasan dan pengetahuan Anda.')}</p>`}
          </div>
          
          <div class="share-section">
            <span><i class="fas fa-share-alt"></i> Bagikan artikel ini:</span>
            <div class="share-buttons">
              <a href="https://wa.me/?text=${encodeURIComponent(article.title + ' - ' + window.location.href)}" target="_blank" class="share-btn share-wa"><i class="fab fa-whatsapp"></i> WhatsApp</a>
              <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" target="_blank" class="share-btn share-fb"><i class="fab fa-facebook-f"></i> Facebook</a>
              <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent(article.title)}&url=${encodeURIComponent(window.location.href)}" target="_blank" class="share-btn share-twitter"><i class="fab fa-twitter"></i> Twitter</a>
            </div>
          </div>
          
          <div class="comments-section">
            <div class="comments-title">
              <i class="fas fa-comments" style="color: var(--primary);"></i> 
              Komentar (${articleComments.length})
            </div>
            <div id="commentsList"></div>
            <div class="comment-form">
              <textarea id="newComment" rows="3" placeholder="Tulis komentar kamu..."></textarea>
              <button class="btn-submit" id="submitComment"><i class="fas fa-paper-plane"></i> Kirim Komentar</button>
            </div>
          </div>
          
          ${relatedHtml}
        </div>
      </div>
    `;
    
    renderComments();
    
    document.getElementById('submitComment')?.addEventListener('click', () => {
      const text = document.getElementById('newComment').value.trim();
      if (text) {
        articleComments.push({
          name: currentUser.name,
          text: text,
          date: new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })
        });
        saveComments();
        renderComments();
        document.getElementById('newComment').value = '';
        // Update jumlah komentar di judul
        const titleSpan = document.querySelector('.comments-title');
        if (titleSpan) {
          titleSpan.innerHTML = `<i class="fas fa-comments" style="color: var(--primary);"></i> Komentar (${articleComments.length})`;
        }
      } else {
        alert('Komentar tidak boleh kosong');
      }
    });
  }
  
  // Sidebar
  const sidebarHtml = `
    <div class="sidebar-header"><div class="logo-icon"><i class="fas fa-feather-alt"></i></div><div class="logo-text">LenteraNusa</div></div>
    <ul class="sidebar-menu">
      <li><a href="dashboard-user.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li><a href="modul.html"><i class="fas fa-book-open"></i> Modul Belajar</a></li>
      <li><a href="paket-kuis.html"><i class="fas fa-question-circle"></i> Kuis</a></li>
      <li><a href="pencapaian-badge.html"><i class="fas fa-medal"></i> Pencapaian</a></li>
      <li><a href="leaderboard.html"><i class="fas fa-chart-line"></i> Leaderboard</a></li>
      <li><a href="toko-hadiah.html"><i class="fas fa-gift"></i> Toko Hadiah</a></li>
      <li class="active"><a href="artikel.html"><i class="fas fa-newspaper"></i> Artikel</a></li>
      <li><a href="forum.html"><i class="fas fa-comments"></i> Forum</a></li>
      <li><a href="profil-siswa.html"><i class="fas fa-user"></i> Profil</a></li>
      <li><a href="pengaturan-siswa.html"><i class="fas fa-cog"></i> Pengaturan</a></li>
      <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Keluar</a></li>
    </ul>
  `;
  document.querySelector('.sidebar').innerHTML = sidebarHtml;
  document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.removeItem('currentUser'); window.location='login.html'; });
  
  const hamburger = document.getElementById('hamburger'), sidebar = document.getElementById('sidebar');
  hamburger.addEventListener('click', () => sidebar.classList.toggle('open'));
  document.addEventListener('click', (e) => { if (window.innerWidth <= 768 && !sidebar.contains(e.target) && !hamburger.contains(e.target)) sidebar.classList.remove('open'); });
</script>
</body>
</html>
