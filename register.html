<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar | LenteraNusa</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(145deg, #FEF9F0 0%, #FDF4E8 100%);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    /* Ukuran card disamakan dengan login: max-width 480px */
    .card {
      max-width: 480px;
      width: 100%;
      background: white;
      border-radius: 48px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.08);
      padding: 44px 36px;
      transition: 0.3s;
    }
    .logo {
      text-align: center;
      font-family: 'Poppins', sans-serif;
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #8B5CF6, #6366F1);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 12px;
    }
    h2 {
      text-align: center;
      font-size: 30px;
      font-weight: 700;
      color: #0F172A;
      margin: 0 0 4px 0;
    }
    .sub {
      text-align: center;
      color: #64748B;
      margin-bottom: 28px;
      font-size: 15px;
    }
    .role-switch {
      display: flex;
      gap: 12px;
      background: #F1F5F9;
      padding: 6px;
      border-radius: 80px;
      margin-bottom: 32px;
    }
    .role-btn {
      flex: 1;
      text-align: center;
      padding: 12px;
      border-radius: 60px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      background: transparent;
      color: #334155;
    }
    .role-btn.active {
      background: linear-gradient(135deg, #8B5CF6, #6366F1);
      color: white;
      box-shadow: 0 6px 14px rgba(99,102,241,0.3);
    }
    input, select {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid #E2E8F0;
      border-radius: 40px;
      font-size: 16px;
      background: #FEF9F0;
      margin-bottom: 18px;
      transition: 0.2s;
      font-family: 'Inter', sans-serif;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #8B5CF6;
      box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
    }
    /* Checkbox styling rapi */
    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      cursor: pointer;
    }
    .checkbox-wrapper input {
      width: auto;
      margin: 0;
      padding: 0;
      cursor: pointer;
      width: 20px;
      height: 20px;
      accent-color: #8B5CF6;
      flex-shrink: 0;
    }
    .checkbox-wrapper label {
      cursor: pointer;
      color: #475569;
      font-size: 15px;
      line-height: 1.4;
      user-select: none;
    }
    .checkbox-wrapper label strong {
      color: #8B5CF6;
    }
    .btn-register {
      width: 100%;
      background: linear-gradient(135deg, #8B5CF6, #6366F1);
      border: none;
      padding: 16px;
      border-radius: 60px;
      font-size: 18px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-register:hover {
      transform: scale(1.02);
      box-shadow: 0 15px 30px -10px rgba(99,102,241,0.4);
    }
    .login-link {
      text-align: center;
      margin-top: 28px;
      color: #64748B;
    }
    .login-link a {
      color: #8B5CF6;
      font-weight: 700;
      text-decoration: none;
    }
    .stats-mini {
      display: flex;
      justify-content: space-between;
      margin-top: 28px;
      gap: 12px;
    }
    .stat-mini {
      flex: 1;
      background: #F8FAFC;
      border-radius: 28px;
      padding: 12px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: #334155;
    }
    .stat-mini i {
      color: #8B5CF6;
      margin-right: 6px;
    }
    @media (max-width: 500px) {
      .card { padding: 32px 24px; }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo"><i class="fas fa-feather-alt"></i> LenteraNusa</div>
  <h2>Daftar Akun Baru</h2>
  <div class="sub">Mulai petualangan belajarmu sekarang!</div>
  
  <div class="role-switch">
    <div class="role-btn active" data-role="siswa">Siswa</div>
    <div class="role-btn" data-role="admin">Admin</div>
  </div>
  
  <form id="regForm">
    <input type="text" id="fullname" placeholder="Nama Lengkap" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password (min. 4 karakter)" required>
    <input type="password" id="confirm" placeholder="Konfirmasi Password" required>
    
    <div id="siswaExtra">
      <select id="jenjang">
        <option>SD</option><option>SMP</option><option>SMA</option>
      </select>
      <input type="text" id="school" placeholder="Sekolah (opsional)">
    </div>
    
    <div class="checkbox-wrapper">
      <input type="checkbox" id="agree" required>
      <label for="agree">Saya setuju dengan <strong>Syarat & Ketentuan</strong></label>
    </div>
    
    <button type="submit" class="btn-register"><i class="fas fa-user-plus"></i> Daftar Sekarang</button>
  </form>
  
  <div class="login-link">Sudah punya akun? <a href="login.html">Masuk di sini</a></div>
  
  <div class="stats-mini">
    <div class="stat-mini"><i class="fas fa-book"></i> 1000+ Modul</div>
    <div class="stat-mini"><i class="fas fa-users"></i> 50K+ Siswa</div>
    <div class="stat-mini"><i class="fas fa-gem"></i> 100% Gratis</div>
  </div>
</div>

<script>
  let selectedRole = 'siswa';
  document.querySelectorAll('.role-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedRole = btn.dataset.role;
      const siswaDiv = document.getElementById('siswaExtra');
      if (selectedRole === 'siswa') siswaDiv.style.display = 'block';
      else siswaDiv.style.display = 'none';
    });
  });

  document.getElementById('regForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const name = document.getElementById('fullname').value.trim();
    const email = document.getElementById('email').value.trim();
    const pwd = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    
    if (pwd !== confirm) { alert("❌ Konfirmasi password tidak cocok"); return; }
    if (pwd.length < 4) { alert("Password minimal 4 karakter"); return; }
    
    const users = JSON.parse(localStorage.getItem('users') || '[]');
    if (users.find(u => u.email === email)) { alert("Email sudah terdaftar, gunakan email lain."); return; }
    
    const newUser = {
      id: Date.now(),
      name: name,
      email: email,
      password: pwd,
      role: selectedRole,
      points: 0,
      jenjang: selectedRole === 'siswa' ? document.getElementById('jenjang').value : '',
      school: selectedRole === 'siswa' ? document.getElementById('school').value : '',
      avatar: ""
    };
    
    users.push(newUser);
    localStorage.setItem('users', JSON.stringify(users));
    alert("✅ Pendaftaran berhasil! Silakan login.");
    window.location.href = "login.html";
  });
</script>
</body>
</html>
