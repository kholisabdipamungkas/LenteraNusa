<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kelola Forum | LenteraNusa Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter', sans-serif; background:#F8FAFC; color:#0F172A; }
    :root { 
      --primary:#5B21B6; 
      --primary-dark:#4C1D95; 
      --secondary:#2563EB;
      --gray-100:#F1F5F9;
      --gray-200:#E2E8F0; 
      --gray-600:#475569; 
      --gray-800:#1E293B;
      --card-bg:#FFFFFF; 
      --shadow-sm:0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md:0 4px 6px -1px rgb(0 0 0 / 0.1);
      --border-radius-card:20px;
    }
    .app { display: flex; min-height: 100vh; }
    .sidebar { 
      width:280px; background:var(--card-bg); border-right:1px solid var(--gray-200);
      position:fixed; top:0; bottom:0; left:0; z-index:50; transition:transform 0.2s ease;
      overflow-y:auto; padding:1.5rem; 
    }
    .sidebar-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:2rem; padding-bottom:1rem; border-bottom:1px solid var(--gray-200); }
    .logo-icon { background:linear-gradient(135deg,var(--primary),var(--secondary)); width:36px; height:36px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:white; }
    .logo-text { font-family:'Poppins'; font-weight:700; font-size:1.25rem; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .sidebar-menu { list-style:none; margin-top:1rem; }
    .sidebar-menu li { margin-bottom:0.25rem; }
    .sidebar-menu a { display:flex; align-items:center; gap:0.75rem; padding:0.75rem 1rem; border-radius:12px; color:var(--gray-600); font-weight:500; text-decoration:none; transition:all 0.2s; }
    .sidebar-menu a:hover { background:var(--gray-100); color:var(--primary); }
    .sidebar-menu .active a { background:#EEF2FF; color:var(--primary); }
    .sidebar-menu i { width:1.25rem; }
    .main-content { flex:1; margin-left:280px; padding:2rem; }
    .hamburger { display:none; position:fixed; top:1rem; left:1rem; z-index:60; background:white; border:none; font-size:1.5rem; padding:0.5rem; border-radius:12px; cursor:pointer; box-shadow:var(--shadow-sm); }
    
    /* Page Header */
    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-size: 1.875rem; font-weight: 600; margin-bottom: 0.5rem; }
    .page-header p { color: var(--gray-600); }
    
    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
    .stat-card { background: var(--card-bg); border-radius: var(--border-radius-card); padding: 1.5rem; box-shadow: var(--shadow-sm); border: 1px solid var(--gray-200); transition: all 0.2s; }
    .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
    .stat-icon { width: 48px; height: 48px; background: #EEF2FF; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
    .stat-icon i { font-size: 1.5rem; color: var(--primary); }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--gray-800); }
    .stat-label { font-size: 0.875rem; color: var(--gray-600); }
    
    /* Filter Bar */
    .filter-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; justify-content: space-between; align-items: center; }
    .search-wrapper { flex: 1; position: relative; max-width: 300px; }
    .search-wrapper i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--gray-600); }
    .search-input { width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; border: 1px solid var(--gray-200); border-radius: 40px; background: white; font-size: 0.875rem; transition: 0.2s; }
    .search-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(91,33,182,0.1); }
    .filter-select { padding: 0.75rem 1.5rem; border-radius: 40px; border: 1px solid var(--gray-200); background: white; font-size: 0.875rem; cursor: pointer; }
    
    /* Table Styles */
    .table-container { background: white; border-radius: var(--border-radius-card); border: 1px solid var(--gray-200); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 1rem 1.25rem; text-align: left; border-bottom: 1px solid var(--gray-200); }
    th { background: var(--gray-100); font-weight: 600; color: var(--gray-600); font-size: 0.875rem; }
    td { color: var(--gray-800); font-size: 0.875rem; }
    tr:hover td { background: var(--gray-100); }
    .badge-status { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.7rem; font-weight: 600; display: inline-block; background: #D1FAE5; color: #065F46; }
    .category-badge { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.7rem; font-weight: 600; display: inline-block; }
    .category-matematika { background: #DBEAFE; color: #1E40AF; }
    .category-bahasa { background: #FEF3C7; color: #92400E; }
    .category-ipa { background: #D1FAE5; color: #065F46; }
    .category-ips { background: #FCE7F3; color: #BE185D; }
    .category-tips { background: #E0E7FF; color: #4338CA; }
    .category-umum { background: #F1F5F9; color: #475569; }
    .btn-delete { background: #FEF2F2; color: #EF4444; padding: 0.5rem 0.75rem; border-radius: 8px; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.75rem; font-weight: 500; transition: all 0.2s; }
    .btn-delete:hover { background: #EF4444; color: white; transform: translateY(-2px); }
    .btn-view { background: #EEF2FF; color: var(--primary); padding: 0.5rem 0.75rem; border-radius: 8px; text-decoration: none; display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.75rem; font-weight: 500; transition: all 0.2s; margin-right: 0.5rem; }
    .btn-view:hover { background: var(--primary); color: white; transform: translateY(-2px); }
    
    /* Empty State */
    .empty-state { text-align: center; padding: 3rem; color: var(--gray-600); }
    .empty-state i { font-size: 3rem; color: var(--gray-600); margin-bottom: 1rem; display: block; }
    
    /* Quick Actions */
    .quick-actions { margin-top: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; }
    .btn-action { background: var(--gray-100); padding: 0.5rem 1rem; border-radius: 40px; text-decoration: none; color: var(--gray-600); font-size: 0.8rem; transition: 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; }
    .btn-action:hover { background: var(--primary); color: white; }
    
    @media (max-width: 1024px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    }
    
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); width:260px; }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left:0; padding:1.5rem; padding-top:4rem; }
      .hamburger { display:block; }
      .stats-grid { grid-template-columns: 1fr; }
      .filter-bar { flex-direction: column; align-items: stretch; }
      .search-wrapper { max-width: none; }
      .table-container { overflow-x: auto; }
      table { font-size: 0.75rem; }
      th, td { padding: 0.75rem; }
    }
  </style>
</head>
<body>
<button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <h1>💬 Kelola Forum Diskusi</h1>
      <p>Lihat, cari, dan hapus diskusi di forum</p>
    </div>
    
    <!-- Statistik -->
    <div class="stats-grid" id="statsGrid"></div>
    
    <!-- Filter & Pencarian -->
    <div class="filter-bar">
      <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" id="searchForum" class="search-input" placeholder="Cari diskusi...">
      </div>
      <div>
        <select id="kategoriFilter" class="filter-select">
          <option value="">📂 Semua Kategori</option>
          <option value="Matematika">📐 Matematika</option>
          <option value="Bahasa Indonesia">📖 Bahasa Indonesia</option>
          <option value="Bahasa Inggris">🇬🇧 Bahasa Inggris</option>
          <option value="IPA">🔬 IPA</option>
          <option value="IPS">🌍 IPS</option>
          <option value="Tips Belajar">💡 Tips Belajar</option>
          <option value="Umum">🗣️ Umum</option>
        </select>
      </div>
    </div>
    
    <!-- Tabel Forum -->
    <div class="table-container">
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>No</th>
              <th>Judul Thread</th>
              <th>Pembuat</th>
              <th>Kategori</th>
              <th>Balasan</th>
              <th>Views</th>
              <th>Tanggal</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="forumList"></tbody>
        </table>
      </div>
    </div>
    
    <!-- Quick Actions -->
    <div class="quick-actions">
      <a href="dashboard-admin.html" class="btn-action"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="analitik.html" class="btn-action"><i class="fas fa-chart-pie"></i> Analitik</a>
      <a href="kelola-pengguna.html" class="btn-action"><i class="fas fa-users"></i> Kelola Pengguna</a>
      <a href="kelola-modul.html" class="btn-action"><i class="fas fa-book"></i> Kelola Modul</a>
    </div>
  </main>
</div>

<script>
  (function() {
    // Cek login admin
    var currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!currentUser || currentUser.role !== 'admin') {
      window.location = 'login.html';
      return;
    }
    
    // Data forum
    var forums = JSON.parse(localStorage.getItem('forums')) || [];
    
    // Data dummy jika kosong
    if (forums.length === 0) {
      forums = [
        { id: 1, title: "Bagaimana cara mengatasi kesulitan belajar matematika?", author: "Siti Nurhaliza", category: "Matematika", date: "15 Februari 2024", replies: 12, views: 234, content: "...", comments: [] },
        { id: 2, title: "Tips meningkatkan kemampuan menulis karangan", author: "Budi Santoso", category: "Bahasa Indonesia", date: "14 Februari 2024", replies: 8, views: 156, content: "...", comments: [] },
        { id: 3, title: "Rekomendasi aplikasi belajar bahasa Inggris gratis", author: "Ahmad Fauzi", category: "Bahasa Inggris", date: "13 Februari 2024", replies: 15, views: 312, content: "...", comments: [] },
        { id: 4, title: "Cara menghafal rumus fisika dengan cepat", author: "Dewi Putri", category: "IPA", date: "12 Februari 2024", replies: 6, views: 189, content: "...", comments: [] },
        { id: 5, title: "Diskusi tentang perubahan iklim", author: "Rizki Ramadhan", category: "IPS", date: "11 Februari 2024", replies: 23, views: 567, content: "...", comments: [] },
        { id: 6, title: "Teknik membaca cepat untuk ujian", author: "Tim LenteraNusa", category: "Tips Belajar", date: "10 Februari 2024", replies: 34, views: 892, content: "...", comments: [] }
      ];
      localStorage.setItem('forums', JSON.stringify(forums));
    }
    
    // Hitung statistik
    var totalTopics = forums.length;
    var totalReplies = forums.reduce(function(sum, f) { return sum + (f.replies || 0); }, 0);
    var totalViews = forums.reduce(function(sum, f) { return sum + (f.views || 0); }, 0);
    var categoriesCount = [...new Set(forums.map(function(f) { return f.category; }))].length;
    
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-comments"></i></div>
        <div class="stat-value">${totalTopics}</div>
        <div class="stat-label">Total Topik</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-reply-all"></i></div>
        <div class="stat-value">${totalReplies.toLocaleString()}</div>
        <div class="stat-label">Total Balasan</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-eye"></i></div>
        <div class="stat-value">${totalViews.toLocaleString()}</div>
        <div class="stat-label">Total Views</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-tags"></i></div>
        <div class="stat-value">${categoriesCount}</div>
        <div class="stat-label">Kategori</div>
      </div>
    `;
    
    // Fungsi untuk mendapatkan class kategori
    function getCategoryClass(category) {
      if (category === 'Matematika') return 'category-matematika';
      if (category === 'Bahasa Indonesia' || category === 'Bahasa Inggris') return 'category-bahasa';
      if (category === 'IPA') return 'category-ipa';
      if (category === 'IPS') return 'category-ips';
      if (category === 'Tips Belajar') return 'category-tips';
      return 'category-umum';
    }
    
    function getCategoryIcon(category) {
      if (category === 'Matematika') return '📐';
      if (category === 'Bahasa Indonesia') return '📖';
      if (category === 'Bahasa Inggris') return '🇬🇧';
      if (category === 'IPA') return '🔬';
      if (category === 'IPS') return '🌍';
      if (category === 'Tips Belajar') return '💡';
      return '🗣️';
    }
    
    // Fungsi render tabel
    function renderForums() {
      var search = document.getElementById('searchForum').value.toLowerCase();
      var kategori = document.getElementById('kategoriFilter').value;
      
      var filtered = forums.filter(function(f) {
        var matchSearch = f.title.toLowerCase().includes(search) || 
                         (f.author && f.author.toLowerCase().includes(search));
        var matchKategori = kategori === '' || f.category === kategori;
        return matchSearch && matchKategori;
      });
      
      var html = '';
      if (filtered.length === 0) {
        html = '<tr><td colspan="8" class="empty-state"><i class="fas fa-comment-slash"></i>Belum ada diskusi</td></tr>';
      } else {
        for (var i = 0; i < filtered.length; i++) {
          var f = filtered[i];
          var categoryClass = getCategoryClass(f.category);
          var categoryIcon = getCategoryIcon(f.category);
          
          html += `
            <tr>
              <td>${i + 1}</td>
              <td>
                <i class="fas fa-comment" style="color: var(--primary); margin-right: 0.5rem;"></i>
                ${escapeHtml(f.title)}
              </td>
              <td><i class="fas fa-user" style="color: var(--gray-600);"></i> ${escapeHtml(f.author)}</td>
              <td><span class="category-badge ${categoryClass}">${categoryIcon} ${escapeHtml(f.category)}</span></td>
              <td><i class="fas fa-reply"></i> ${f.replies || 0}</td>
              <td><i class="fas fa-eye"></i> ${(f.views || 0).toLocaleString()}</td>
              <td><i class="far fa-calendar-alt"></i> ${escapeHtml(f.date)}</td>
              <td>
                <a href="detail-forum.html?id=${f.id}" class="btn-view" target="_blank"><i class="fas fa-eye"></i> Lihat</a>
                <button class="btn-delete" data-id="${f.id}"><i class="fas fa-trash"></i> Hapus</button>
              </td>
            </tr>
          `;
        }
      }
      document.getElementById('forumList').innerHTML = html;
      
      // Event listener untuk tombol hapus
      var deleteBtns = document.querySelectorAll('.btn-delete');
      for (var j = 0; j < deleteBtns.length; j++) {
        deleteBtns[j].addEventListener('click', function() {
          var id = parseInt(this.getAttribute('data-id'));
          if (confirm('Apakah Anda yakin ingin menghapus diskusi ini? Semua balasan juga akan dihapus.')) {
            forums = forums.filter(function(f) { return f.id !== id; });
            localStorage.setItem('forums', JSON.stringify(forums));
            
            // Update statistik
            var newTotalTopics = forums.length;
            var newTotalReplies = forums.reduce(function(sum, f) { return sum + (f.replies || 0); }, 0);
            var newTotalViews = forums.reduce(function(sum, f) { return sum + (f.views || 0); }, 0);
            var newCategories = [...new Set(forums.map(function(f) { return f.category; }))].length;
            
            document.querySelector('.stats-grid .stat-card:nth-child(1) .stat-value').innerText = newTotalTopics;
            document.querySelector('.stats-grid .stat-card:nth-child(2) .stat-value').innerText = newTotalReplies.toLocaleString();
            document.querySelector('.stats-grid .stat-card:nth-child(3) .stat-value').innerText = newTotalViews.toLocaleString();
            document.querySelector('.stats-grid .stat-card:nth-child(4) .stat-value').innerText = newCategories;
            
            renderForums();
          }
        });
      }
    }
    
    function escapeHtml(text) {
      if (!text) return '';
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Event listener untuk filter dan search
    document.getElementById('searchForum').addEventListener('input', renderForums);
    document.getElementById('kategoriFilter').addEventListener('change', renderForums);
    
    // Render awal
    renderForums();
    
    // Sidebar HTML lengkap
    var sidebarHtml = `
      <div class="sidebar-header">
        <div class="logo-icon"><i class="fas fa-feather-alt"></i></div>
        <div class="logo-text">LenteraNusa</div>
        <small style="margin-left:auto; font-size:10px; color:var(--primary);">Admin</small>
      </div>
      <ul class="sidebar-menu">
        <li><a href="dashboard-admin.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
        <li><a href="analitik.html"><i class="fas fa-chart-pie"></i> Analitik</a></li>
        <li><a href="kelola-artikel.html"><i class="fas fa-newspaper"></i> Kelola Artikel</a></li>
        <li><a href="kelola-produk.html"><i class="fas fa-gift"></i> Kelola Produk</a></li>
        <li><a href="kelola-pengguna.html"><i class="fas fa-users"></i> Kelola Pengguna</a></li>
        <li><a href="kelola-transaksi.html"><i class="fas fa-credit-card"></i> Kelola Transaksi</a></li>
        <li><a href="kelola-modul.html"><i class="fas fa-book"></i> Kelola Modul</a></li>
        <li><a href="kelola-badge.html"><i class="fas fa-medal"></i> Kelola Badge</a></li>
        <li class="active"><a href="kelola-forum.html"><i class="fas fa-comments"></i> Kelola Forum</a></li>
        <li><a href="kelola-kuis.html"><i class="fas fa-question-circle"></i> Kelola Kuis</a></li>
        <li><a href="profil-admin.html"><i class="fas fa-user-shield"></i> Profil</a></li>
        <li><a href="pengaturan-admin.html"><i class="fas fa-cog"></i> Pengaturan</a></li>
        <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Keluar</a></li>
      </ul>
    `;
    
    var sidebar = document.querySelector('.sidebar');
    if (sidebar) sidebar.innerHTML = sidebarHtml;
    
    // Logout
    var logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
      logoutBtn.addEventListener('click', function() { 
        localStorage.removeItem('currentUser'); 
        window.location = 'login.html'; 
      });
    }
    
    // Hamburger menu
    var hamburger = document.getElementById('hamburger');
    var sidebarElement = document.getElementById('sidebar');
    if (hamburger && sidebarElement) {
      hamburger.addEventListener('click', function() { 
        sidebarElement.classList.toggle('open'); 
      });
    }
    
    // Tutup sidebar saat klik di luar (mobile)
    document.addEventListener('click', function(e) {
      if (window.innerWidth <= 768) {
        if (sidebarElement && hamburger && !sidebarElement.contains(e.target) && !hamburger.contains(e.target)) {
          sidebarElement.classList.remove('open');
        }
      }
    });
  })();
</script>
</body>
</html>
