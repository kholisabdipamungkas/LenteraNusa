<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Pembayaran Berhasil | LenteraNusa</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .success-card { background: white; border-radius: 32px; padding: 3rem; text-align: center; max-width: 500px; box-shadow: 0 20px 35px rgba(0,0,0,0.1); animation: fadeIn 0.5s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .success-icon { width: 80px; height: 80px; background: #10B981; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
    .success-icon i { font-size: 3rem; color: white; }
    .order-id { background: #F1F5F9; padding: 0.75rem; border-radius: 12px; margin: 1rem 0; }
    .btn-home { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 0.75rem 2rem; border-radius: 40px; text-decoration: none; display: inline-block; margin-top: 1rem; font-weight: 600; transition: 0.2s; }
    .btn-home:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(91,33,182,0.3); }
    .btn-history { display: block; margin-top: 1rem; color: var(--primary); text-decoration: none; font-weight: 500; }
    .btn-history:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="success-card" id="successCard">
  <div class="success-icon">
    <i class="fas fa-check-circle"></i>
  </div>
  <h1>Pembayaran Berhasil! 🎉</h1>
  <p>Pesananmu sedang diproses</p>
  <div class="order-id" id="orderId">Nomor Pesanan: -</div>
  <a href="dashboard-user.html" class="btn-home"><i class="fas fa-home"></i> Kembali ke Dashboard</a>
  <a href="riwayat-transaksi.html" class="btn-history"><i class="fas fa-history"></i> Lihat Riwayat Transaksi</a>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const transId = urlParams.get('id');
  if (transId) {
    document.getElementById('orderId').innerHTML = `<i class="fas fa-receipt"></i> Nomor Pesanan: ${transId}`;
  } else {
    document.getElementById('orderId').innerHTML = `<i class="fas fa-receipt"></i> Nomor Pesanan: LN-${Math.floor(Math.random() * 10000)}`;
  }
</script>
</body>
</html>
