<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Profil Siswa | LenteraNusa</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter', sans-serif; background:#F8FAFC; color:#0F172A; }
    :root { 
      --primary:#5B21B6; 
      --primary-dark:#4C1D95; 
      --secondary:#2563EB;
      --gray-100:#F1F5F9;
      --gray-200:#E2E8F0; 
      --gray-600:#475569; 
      --gray-800:#1E293B;
      --card-bg:#FFFFFF; 
      --shadow-sm:0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md:0 4px 6px -1px rgb(0 0 0 / 0.1);
      --border-radius-card:20px;
    }
    .app { display: flex; min-height: 100vh; }
    .sidebar { 
      width:280px; background:var(--card-bg); border-right:1px solid var(--gray-200);
      position:fixed; top:0; bottom:0; left:0; z-index:50; transition:transform 0.2s ease;
      overflow-y:auto; padding:1.5rem; 
    }
    .sidebar-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:2rem; padding-bottom:1rem; border-bottom:1px solid var(--gray-200); }
    .logo-icon { background:linear-gradient(135deg,var(--primary),var(--secondary)); width:36px; height:36px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:white; }
    .logo-text { font-family:'Poppins'; font-weight:700; font-size:1.25rem; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .sidebar-menu { list-style:none; margin-top:1rem; }
    .sidebar-menu li { margin-bottom:0.25rem; }
    .sidebar-menu a { display:flex; align-items:center; gap:0.75rem; padding:0.75rem 1rem; border-radius:12px; color:var(--gray-600); font-weight:500; text-decoration:none; transition:all 0.2s; }
    .sidebar-menu a:hover { background:var(--gray-100); color:var(--primary); }
    .sidebar-menu .active a { background:#EEF2FF; color:var(--primary); }
    .sidebar-menu i { width:1.25rem; }
    .main-content { flex:1; margin-left:280px; padding:2rem; }
    .hamburger { display:none; position:fixed; top:1rem; left:1rem; z-index:60; background:white; border:none; font-size:1.5rem; padding:0.5rem; border-radius:12px; cursor:pointer; box-shadow:var(--shadow-sm); }
    
    /* Page Header */
    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-size: 1.875rem; font-weight: 600; margin-bottom: 0.5rem; }
    .page-header p { color: var(--gray-600); }
    
    /* Profile Layout */
    .profile-wrapper { display: grid; grid-template-columns: 300px 1fr; gap: 1.5rem; }
    
    /* Profile Sidebar */
    .profile-sidebar { background: white; border-radius: var(--border-radius-card); padding: 2rem; text-align: center; border: 1px solid var(--gray-200); height: fit-content; }
    .avatar { width: 120px; height: 120px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; color: white; font-size: 3rem; box-shadow: var(--shadow-md); }
    .profile-name { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.25rem; }
    .profile-email { font-size: 0.8rem; color: var(--gray-600); margin-bottom: 1rem; }
    .btn-edit { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 0.6rem 1.5rem; border-radius: 40px; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 600; transition: all 0.2s; margin-top: 0.5rem; }
    .btn-edit:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(91,33,182,0.3); }
    
    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: white; border-radius: var(--border-radius-card); padding: 1rem; text-align: center; border: 1px solid var(--gray-200); }
    .stat-card .value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .stat-card .label { font-size: 0.7rem; color: var(--gray-600); margin-top: 0.25rem; }
    
    /* Info Card */
    .info-card { background: white; border-radius: var(--border-radius-card); padding: 1.5rem; border: 1px solid var(--gray-200); margin-bottom: 1.5rem; }
    .info-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; border-bottom: 2px solid var(--gray-200); padding-bottom: 0.5rem; }
    .info-title i { color: var(--primary); }
    .info-row { display: flex; padding: 0.75rem 0; border-bottom: 1px solid var(--gray-100); }
    .info-label { width: 120px; font-weight: 600; color: var(--gray-600); }
    .info-value { flex: 1; color: var(--gray-800); }
    .info-row:last-child { border-bottom: none; }
    
    /* Badge List */
    .badge-list { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .badge-item { background: var(--gray-100); border-radius: 40px; padding: 0.25rem 0.75rem; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 0.25rem; }
    
    /* Recent Activity */
    .activity-list { margin-top: 0.5rem; }
    .activity-item { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 0; border-bottom: 1px solid var(--gray-100); }
    .activity-icon { width: 32px; height: 32px; background: var(--gray-100); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); }
    .activity-detail { flex: 1; }
    .activity-title { font-size: 0.875rem; font-weight: 500; }
    .activity-date { font-size: 0.7rem; color: var(--gray-600); }
    
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); width:260px; }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left:0; padding:1.5rem; padding-top:4rem; }
      .hamburger { display:block; }
      .profile-wrapper { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr; gap: 0.75rem; }
      .info-row { flex-direction: column; gap: 0.25rem; }
      .info-label { width: 100%; }
    }
  </style>
</head>
<body>
<button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <h1>👤 Profil Saya</h1>
      <p>Lihat dan kelola informasi profil kamu</p>
    </div>
    
    <div id="profileContent"></div>
  </main>
</div>

<script>
  const currentUser = JSON.parse(localStorage.getItem('currentUser'));
  if (!currentUser || currentUser.role !== 'siswa') window.location = 'login.html';
  
  // Ambil data tambahan
  let users = JSON.parse(localStorage.getItem('users')) || [];
  let quizHistory = JSON.parse(localStorage.getItem('quizHistory')) || [];
  let userQuizHistory = quizHistory.filter(h => h.userEmail === currentUser.email);
  let userBadges = currentUser.badges || [];
  
  // Hitung statistik
  let totalQuizzes = userQuizHistory.length;
  let totalPoints = currentUser.points || 0;
  let avgScore = userQuizHistory.length > 0 
    ? Math.round(userQuizHistory.reduce((sum, h) => sum + (h.score / h.totalQuestions * 100), 0) / userQuizHistory.length) 
    : 0;
  
  // Daftar badge yang dimiliki
  let badges = JSON.parse(localStorage.getItem('badges')) || [];
  let ownedBadges = badges.filter(b => userBadges.includes(b.id));
  
  // Aktivitas terbaru (dari quiz history)
  let recentActivities = userQuizHistory.slice(0, 5);
  
  function getInitial(name) {
    return name ? name.charAt(0).toUpperCase() : 'S';
  }
  
  function renderProfile() {
    const html = `
      <div class="profile-wrapper">
        <!-- Sidebar Profil -->
        <div class="profile-sidebar">
          <div class="avatar">
            ${getInitial(currentUser.name)}
          </div>
          <div class="profile-name">${escapeHtml(currentUser.name)}</div>
          <div class="profile-email">${escapeHtml(currentUser.email)}</div>
          <a href="edit-profil-siswa.html" class="btn-edit">
            <i class="fas fa-edit"></i> Edit Profil
          </a>
        </div>
        
        <!-- Konten Utama -->
        <div>
          <!-- Statistik -->
          <div class="stats-grid">
            <div class="stat-card">
              <div class="value">${totalPoints}</div>
              <div class="label">Total Poin</div>
            </div>
            <div class="stat-card">
              <div class="value">${totalQuizzes}</div>
              <div class="label">Kuis Dikerjakan</div>
            </div>
            <div class="stat-card">
              <div class="value">${avgScore}%</div>
              <div class="label">Rata-rata Nilai</div>
            </div>
          </div>
          
          <!-- Informasi Pribadi -->
          <div class="info-card">
            <div class="info-title">
              <i class="fas fa-id-card"></i> Informasi Pribadi
            </div>
            <div class="info-row">
              <div class="info-label">Nama Lengkap</div>
              <div class="info-value">${escapeHtml(currentUser.name)}</div>
            </div>
            <div class="info-row">
              <div class="info-label">Email</div>
              <div class="info-value">${escapeHtml(currentUser.email)}</div>
            </div>
            <div class="info-row">
              <div class="info-label">Jenjang</div>
              <div class="info-value">${escapeHtml(currentUser.jenjang || 'SD')}</div>
            </div>
            <div class="info-row">
              <div class="info-label">Sekolah</div>
              <div class="info-value">${escapeHtml(currentUser.school || 'Belum diisi')}</div>
            </div>
            <div class="info-row">
              <div class="info-label">Bergabung Sejak</div>
              <div class="info-value">${new Date(currentUser.id || Date.now()).toLocaleDateString('id-ID')}</div>
            </div>
          </div>
          
          <!-- Badge yang Dimiliki -->
          <div class="info-card">
            <div class="info-title">
              <i class="fas fa-medal"></i> Badge yang Dimiliki
            </div>
            ${ownedBadges.length > 0 ? `
              <div class="badge-list">
                ${ownedBadges.map(b => `
                  <div class="badge-item">
                    <span>${b.icon || '🏅'}</span> ${escapeHtml(b.name)}
                  </div>
                `).join('')}
              </div>
            ` : `
              <p style="color: var(--gray-600); text-align: center;">Belum ada badge. Selesaikan lebih banyak modul dan kuis!</p>
            `}
          </div>
          
          <!-- Aktivitas Terbaru -->
          <div class="info-card">
            <div class="info-title">
              <i class="fas fa-history"></i> Aktivitas Terbaru
            </div>
            ${recentActivities.length > 0 ? `
              <div class="activity-list">
                ${recentActivities.map(act => `
                  <div class="activity-item">
                    <div class="activity-icon">
                      <i class="fas fa-puzzle-piece"></i>
                    </div>
                    <div class="activity-detail">
                      <div class="activity-title">${escapeHtml(act.quizTitle)}</div>
                      <div class="activity-date">Nilai: ${act.score}/${act.totalQuestions} • ${act.date || 'Baru saja'}</div>
                    </div>
                  </div>
                `).join('')}
              </div>
            ` : `
              <p style="color: var(--gray-600); text-align: center;">Belum ada aktivitas. Mulai kerjakan kuis sekarang!</p>
            `}
          </div>
        </div>
      </div>
    `;
    
    document.getElementById('profileContent').innerHTML = html;
  }
  
  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
  
  renderProfile();
  
  // Sidebar
  const sidebarHtml = `
    <div class="sidebar-header"><div class="logo-icon"><i class="fas fa-feather-alt"></i></div><div class="logo-text">LenteraNusa</div></div>
    <ul class="sidebar-menu">
      <li><a href="dashboard-user.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li><a href="modul.html"><i class="fas fa-book-open"></i> Modul Belajar</a></li>
      <li><a href="paket-kuis.html"><i class="fas fa-question-circle"></i> Kuis</a></li>
      <li><a href="pencapaian-badge.html"><i class="fas fa-medal"></i> Pencapaian</a></li>
      <li><a href="leaderboard.html"><i class="fas fa-chart-line"></i> Leaderboard</a></li>
      <li><a href="toko-hadiah.html"><i class="fas fa-gift"></i> Toko Hadiah</a></li>
      <li><a href="artikel.html"><i class="fas fa-newspaper"></i> Artikel</a></li>
      <li><a href="forum.html"><i class="fas fa-comments"></i> Forum</a></li>
      <li class="active"><a href="profil-siswa.html"><i class="fas fa-user"></i> Profil</a></li>
      <li><a href="pengaturan-siswa.html"><i class="fas fa-cog"></i> Pengaturan</a></li>
      <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Keluar</a></li>
    </ul>
  `;
  document.querySelector('.sidebar').innerHTML = sidebarHtml;
  document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.removeItem('currentUser'); window.location='login.html'; });
  
  const hamburger = document.getElementById('hamburger'), sidebar = document.getElementById('sidebar');
  hamburger.addEventListener('click', () => sidebar.classList.toggle('open'));
  document.addEventListener('click', (e) => { if (window.innerWidth <= 768 && !sidebar.contains(e.target) && !hamburger.contains(e.target)) sidebar.classList.remove('open'); });
</script>
</body>
</html>
