<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Artikel Edukatif | LenteraNusa</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter', sans-serif; background:#F8FAFC; color:#0F172A; }
    :root { 
      --primary:#5B21B6; 
      --primary-dark:#4C1D95; 
      --secondary:#2563EB;
      --gray-100:#F1F5F9;
      --gray-200:#E2E8F0; 
      --gray-600:#475569; 
      --gray-800:#1E293B;
      --card-bg:#FFFFFF; 
      --shadow-sm:0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md:0 4px 6px -1px rgb(0 0 0 / 0.1);
      --border-radius-card:20px;
    }
    .app { display: flex; min-height: 100vh; }
    .sidebar { 
      width:280px; background:var(--card-bg); border-right:1px solid var(--gray-200);
      position:fixed; top:0; bottom:0; left:0; z-index:50; transition:transform 0.2s ease;
      overflow-y:auto; padding:1.5rem; 
    }
    .sidebar-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:2rem; padding-bottom:1rem; border-bottom:1px solid var(--gray-200); }
    .logo-icon { background:linear-gradient(135deg,var(--primary),var(--secondary)); width:36px; height:36px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:white; }
    .logo-text { font-family:'Poppins'; font-weight:700; font-size:1.25rem; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .sidebar-menu { list-style:none; margin-top:1rem; }
    .sidebar-menu li { margin-bottom:0.25rem; }
    .sidebar-menu a { display:flex; align-items:center; gap:0.75rem; padding:0.75rem 1rem; border-radius:12px; color:var(--gray-600); font-weight:500; text-decoration:none; transition:all 0.2s; }
    .sidebar-menu a:hover { background:var(--gray-100); color:var(--primary); }
    .sidebar-menu .active a { background:#EEF2FF; color:var(--primary); }
    .sidebar-menu i { width:1.25rem; }
    .main-content { flex:1; margin-left:280px; padding:2rem; }
    .hamburger { display:none; position:fixed; top:1rem; left:1rem; z-index:60; background:white; border:none; font-size:1.5rem; padding:0.5rem; border-radius:12px; cursor:pointer; box-shadow:var(--shadow-sm); }
    
    /* Page Header */
    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-size: 1.875rem; font-weight: 600; margin-bottom: 0.5rem; }
    .page-header p { color: var(--gray-600); }
    
    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: white; border-radius: var(--border-radius-card); padding: 1rem; text-align: center; border: 1px solid var(--gray-200); }
    .stat-card .value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .stat-card .label { font-size: 0.7rem; color: var(--gray-600); margin-top: 0.25rem; }
    
    /* Filter Bar */
    .filter-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .search-wrapper { flex: 1; position: relative; }
    .search-wrapper i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--gray-600); }
    .search-input { width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; border: 1px solid var(--gray-200); border-radius: 40px; background: white; font-size: 0.875rem; transition: 0.2s; }
    .search-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(91,33,182,0.1); }
    .filter-select { padding: 0.75rem 1.5rem; border-radius: 40px; border: 1px solid var(--gray-200); background: white; font-size: 0.875rem; cursor: pointer; }
    
    /* Article Grid */
    .article-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    .article-card { background: white; border-radius: var(--border-radius-card); border: 1px solid var(--gray-200); overflow: hidden; transition: all 0.3s ease; }
    .article-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
    .article-image { height: 160px; background-size: cover; background-position: center; position: relative; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; }
    .article-category { position: absolute; top: 1rem; left: 1rem; display: inline-block; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.7rem; background: rgba(91,33,182,0.9); color: white; backdrop-filter: blur(4px); }
    .article-content { padding: 1.25rem; }
    .article-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; line-height: 1.4; }
    .article-title a { color: var(--gray-800); text-decoration: none; transition: 0.2s; }
    .article-title a:hover { color: var(--primary); }
    .article-meta { display: flex; align-items: center; gap: 1rem; font-size: 0.7rem; color: var(--gray-600); margin-bottom: 0.75rem; flex-wrap: wrap; }
    .article-meta i { width: 14px; margin-right: 4px; }
    .article-excerpt { font-size: 0.8rem; color: var(--gray-600); line-height: 1.5; margin-bottom: 1rem; }
    .article-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; }
    .btn-read { color: var(--primary); text-decoration: none; font-weight: 600; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 0.25rem; transition: 0.2s; }
    .btn-read:hover { gap: 0.5rem; color: var(--primary-dark); }
    .article-views { font-size: 0.7rem; color: var(--gray-600); }
    
    /* Empty State */
    .empty-state { text-align: center; padding: 3rem; background: white; border-radius: var(--border-radius-card); border: 1px solid var(--gray-200); }
    .empty-state i { font-size: 3rem; color: var(--gray-600); margin-bottom: 1rem; display: block; }
    .empty-state h3 { margin-bottom: 0.5rem; }
    .empty-state p { color: var(--gray-600); }
    
    @media (max-width:768px) {
      .sidebar { transform: translateX(-100%); width:260px; }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left:0; padding:1.5rem; padding-top:4rem; }
      .hamburger { display:block; }
      .stats-grid { grid-template-columns: 1fr; gap: 0.75rem; }
      .filter-bar { flex-direction: column; }
      .article-image { height: 140px; font-size: 2.5rem; }
    }
  </style>
</head>
<body>
<button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <h1>📚 Artikel Edukatif</h1>
      <p>Temukan artikel menarik seputar dunia pendidikan dan pembelajaran</p>
    </div>
    
    <div class="stats-grid" id="statsGrid"></div>
    
    <div class="filter-bar">
      <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" id="searchArticle" class="search-input" placeholder="Cari artikel...">
      </div>
      <select id="categoryFilter" class="filter-select">
        <option value="">📖 Semua Kategori</option>
        <option value="Tips Belajar">💡 Tips Belajar</option>
        <option value="Motivasi">🌟 Motivasi</option>
        <option value="Teknologi Pendidikan">💻 Teknologi Pendidikan</option>
        <option value="Pengembangan Diri">🌱 Pengembangan Diri</option>
        <option value="Literasi">📖 Literasi</option>
      </select>
    </div>
    
    <div id="articleList" class="article-grid"></div>
  </main>
</div>

<script>
  const currentUser = JSON.parse(localStorage.getItem('currentUser'));
  if (!currentUser || currentUser.role !== 'siswa') window.location = 'login.html';
  
  let articles = JSON.parse(localStorage.getItem('articles')) || [];
  if (articles.length === 0 || articles.length < 6) {
    articles = [
      { 
        id: 1, 
        title: "5 Tips Meningkatkan Kemampuan Membaca Cepat", 
        category: "Tips Belajar", 
        author: "Tim LenteraNusa", 
        date: "15 Desember 2024", 
        views: 1234, 
        icon: "📖",
        bgColor: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",
        excerpt: "Membaca cepat adalah keterampilan penting yang dapat membantu Anda menyerap informasi lebih banyak dalam waktu singkat...",
        content: "Membaca cepat adalah keterampilan penting yang dapat membantu Anda menyerap informasi lebih banyak dalam waktu singkat. Berikut 5 tips yang bisa Anda coba: 1) Gunakan jari sebagai penunjuk untuk membantu fokus. 2) Hindari subvokalisasi (membaca dalam hati). 3) Latih mata untuk melihat lebih banyak kata dalam satu pandangan. 4) Fokus pada kata kunci dan ide utama. 5) Perbanyak latihan secara rutin setiap hari." 
      },
      { 
        id: 2, 
        title: "Cara Menulis Karangan yang Menarik", 
        category: "Tips Belajar", 
        author: "Dr. Siti Aminah", 
        date: "14 Desember 2024", 
        views: 987, 
        icon: "✍️",
        bgColor: "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)",
        excerpt: "Menulis karangan yang baik memerlukan struktur yang jelas, pilihan kata yang tepat, dan kemampuan menyampaikan ide dengan runtut...",
        content: "Menulis karangan yang baik memerlukan struktur yang jelas, pilihan kata yang tepat, dan kemampuan menyampaikan ide dengan runtut. Mulailah dengan menentukan tema yang menarik. Buat kerangka tulisan agar lebih terstruktur. Kembangkan setiap paragraf dengan ide pendukung. Gunakan kata penghubung agar alur cerita mengalir. Akhiri dengan kesimpulan yang kuat dan berkesan." 
      },
      { 
        id: 3, 
        title: "Motivasi Belajar di Era Digital", 
        category: "Motivasi", 
        author: "Ahmad Fauzi", 
        date: "13 Desember 2024", 
        views: 2156, 
        icon: "🚀",
        bgColor: "linear-gradient(135deg, #fa709a 0%, #fee140 100%)",
        excerpt: "Di era digital ini, tantangan belajar semakin kompleks dengan hadirnya berbagai distraksi dari gadget dan media sosial...",
        content: "Di era digital ini, tantangan belajar semakin kompleks dengan hadirnya berbagai distraksi dari gadget dan media sosial. Namun dengan strategi yang tepat, kita bisa tetap produktif. Matikan notifikasi saat belajar. Buat jadwal belajar rutin setiap hari. Gunakan teknik Pomodoro (25 menit belajar, 5 menit istirahat). Temukan lingkungan belajar yang nyaman dan bebas gangguan." 
      },
      { 
        id: 4, 
        title: "Teknologi AI dalam Dunia Pendidikan", 
        category: "Teknologi Pendidikan", 
        author: "Tim LenteraNusa", 
        date: "12 Desember 2024", 
        views: 876, 
        icon: "🤖",
        bgColor: "linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)",
        excerpt: "Artificial Intelligence membawa perubahan besar dalam dunia pendidikan, dari personalisasi pembelajaran hingga sistem penilaian...",
        content: "Artificial Intelligence membawa perubahan besar dalam dunia pendidikan. AI dapat membantu personalisasi pembelajaran sesuai gaya belajar siswa. Sistem penilaian otomatis mempercepat koreksi tugas. Tutor virtual tersedia 24/7 untuk membantu siswa. Analisis performa siswa membantu guru memahami kebutuhan belajar. Peluang dan tantangan AI di pendidikan perlu dipahami oleh guru dan siswa." 
      },
      { 
        id: 5, 
        title: "Membangun Kebiasaan Belajar yang Konsisten", 
        category: "Pengembangan Diri", 
        author: "Dr. Budi Santoso", 
        date: "11 Desember 2024", 
        views: 1543, 
        icon: "🌱",
        bgColor: "linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)",
        excerpt: "Konsistensi adalah kunci kesuksesan dalam belajar. Tanpa konsistensi, ilmu yang didapat tidak akan maksimal...",
        content: "Konsistensi adalah kunci kesuksesan dalam belajar. Tanpa konsistensi, ilmu yang didapat tidak akan maksimal. Mulailah dengan target kecil yang realistis. Buat rutinitas belajar harian di waktu yang sama. Reward diri sendiri setelah mencapai target mingguan. Catat progress belajar untuk melihat perkembangan. Jangan takut gagal, karena kegagalan adalah bagian dari proses belajar." 
      },
      { 
        id: 6, 
        title: "Pentingnya Literasi Digital bagi Siswa", 
        category: "Literasi", 
        author: "Siti Nurhaliza", 
        date: "10 Desember 2024", 
        views: 2341, 
        icon: "💻",
        bgColor: "linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)",
        excerpt: "Literasi digital bukan hanya tentang menggunakan teknologi, tetapi juga memahami etika, keamanan, dan kemampuan mengevaluasi informasi...",
        content: "Literasi digital bukan hanya tentang menggunakan teknologi, tetapi juga memahami etika, keamanan, dan kemampuan mengevaluasi informasi. Siswa perlu dibekali kemampuan mencari sumber terpercaya. Penting untuk menjaga privasi data pribadi di internet. Berperilaku positif dan bijak di media sosial. Kemampuan memfilter informasi hoaks sangat diperlukan di era digital ini." 
      }
    ];
    localStorage.setItem('articles', JSON.stringify(articles));
  }
  
  // Hitung statistik
  let totalArticles = articles.length;
  let totalCategories = [...new Set(articles.map(a => a.category))].length;
  let totalViews = articles.reduce((sum, a) => sum + (a.views || 0), 0);
  
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="value">${totalArticles}</div>
      <div class="label">Total Artikel</div>
    </div>
    <div class="stat-card">
      <div class="value">${totalCategories}</div>
      <div class="label">Kategori</div>
    </div>
    <div class="stat-card">
      <div class="value">${totalViews.toLocaleString()}</div>
      <div class="label">Total Dibaca</div>
    </div>
  `;
  
  function formatViews(views) {
    if (views >= 1000) {
      return (views / 1000).toFixed(1) + ' rb';
    }
    return views;
  }
  
  function renderArticles(search = '', category = '') {
    let filtered = articles.filter(a => 
      a.title.toLowerCase().includes(search.toLowerCase()) && 
      (category === '' || a.category === category)
    );
    
    let html = '';
    if (filtered.length === 0) {
      html = `
        <div class="empty-state">
          <i class="fas fa-newspaper"></i>
          <h3>Tidak ada artikel</h3>
          <p>Coba cari dengan kata kunci lain</p>
        </div>
      `;
    } else {
      filtered.forEach(article => {
        let excerpt = article.excerpt || article.content.substring(0, 100) + '...';
        
        html += `
          <div class="article-card">
            <div class="article-image" style="background: ${article.bgColor};">
              <span style="font-size: 3rem;">${article.icon}</span>
              <span class="article-category">${article.category}</span>
            </div>
            <div class="article-content">
              <h3 class="article-title">
                <a href="detail-artikel.html?id=${article.id}">${article.title}</a>
              </h3>
              <div class="article-meta">
                <span><i class="fas fa-user"></i> ${article.author}</span>
                <span><i class="far fa-calendar-alt"></i> ${article.date}</span>
              </div>
              <p class="article-excerpt">${excerpt}</p>
              <div class="article-footer">
                <a href="detail-artikel.html?id=${article.id}" class="btn-read">
                  Baca Selengkapnya <i class="fas fa-arrow-right"></i>
                </a>
                <div class="article-views">
                  <i class="fas fa-eye"></i> ${formatViews(article.views)}
                </div>
              </div>
            </div>
          </div>
        `;
      });
    }
    document.getElementById('articleList').innerHTML = html;
  }
  
  renderArticles();
  
  // Event filter
  document.getElementById('searchArticle').addEventListener('input', e => 
    renderArticles(e.target.value, document.getElementById('categoryFilter').value));
  document.getElementById('categoryFilter').addEventListener('change', e => 
    renderArticles(document.getElementById('searchArticle').value, e.target.value));
  
  // Sidebar
  const sidebarHtml = `
    <div class="sidebar-header"><div class="logo-icon"><i class="fas fa-feather-alt"></i></div><div class="logo-text">LenteraNusa</div></div>
    <ul class="sidebar-menu">
      <li><a href="dashboard-user.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li><a href="modul.html"><i class="fas fa-book-open"></i> Modul Belajar</a></li>
      <li><a href="paket-kuis.html"><i class="fas fa-question-circle"></i> Kuis</a></li>
      <li><a href="pencapaian-badge.html"><i class="fas fa-medal"></i> Pencapaian</a></li>
      <li><a href="leaderboard.html"><i class="fas fa-chart-line"></i> Leaderboard</a></li>
      <li><a href="toko-hadiah.html"><i class="fas fa-gift"></i> Toko Hadiah</a></li>
      <li class="active"><a href="artikel.html"><i class="fas fa-newspaper"></i> Artikel</a></li>
      <li><a href="forum.html"><i class="fas fa-comments"></i> Forum</a></li>
      <li><a href="profil-siswa.html"><i class="fas fa-user"></i> Profil</a></li>
      <li><a href="pengaturan-siswa.html"><i class="fas fa-cog"></i> Pengaturan</a></li>
      <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Keluar</a></li>
    </ul>
  `;
  document.querySelector('.sidebar').innerHTML = sidebarHtml;
  document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.removeItem('currentUser'); window.location='login.html'; });
  
  const hamburger = document.getElementById('hamburger'), sidebar = document.getElementById('sidebar');
  hamburger.addEventListener('click', () => sidebar.classList.toggle('open'));
  document.addEventListener('click', (e) => { if (window.innerWidth <= 768 && !sidebar.contains(e.target) && !hamburger.contains(e.target)) sidebar.classList.remove('open'); });
</script>
</body>
</html>
