<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Profil Admin | LenteraNusa Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #F8FAFC;
      color: #0F172A;
    }

    :root {
      --primary: #5B21B6;
      --primary-dark: #4C1D95;
      --secondary: #2563EB;
      --gray-100: #F1F5F9;
      --gray-200: #E2E8F0;
      --gray-600: #475569;
      --gray-800: #1E293B;
      --card-bg: #FFFFFF;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --border-radius-card: 20px;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--card-bg);
      border-right: 1px solid var(--gray-200);
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 50;
      transition: transform 0.2s ease;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--gray-200);
    }

    .logo-icon {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .logo-text {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1.25rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .sidebar-menu {
      list-style: none;
      margin-top: 1rem;
    }

    .sidebar-menu li {
      margin-bottom: 0.25rem;
    }

    .sidebar-menu a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      color: var(--gray-600);
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
    }

    .sidebar-menu a:hover {
      background: var(--gray-100);
      color: var(--primary);
    }

    .sidebar-menu .active a {
      background: #EEF2FF;
      color: var(--primary);
    }

    .sidebar-menu i {
      width: 1.25rem;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: 280px;
      padding: 2rem;
    }

    /* Page Header */
    .page-header {
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-size: 1.875rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: var(--gray-600);
    }

    /* Profile Wrapper */
    .profile-wrapper {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 1.5rem;
    }

    /* Profile Sidebar */
    .profile-sidebar {
      background: white;
      border-radius: var(--border-radius-card);
      padding: 2rem;
      text-align: center;
      border: 1px solid var(--gray-200);
      height: fit-content;
    }

    .avatar {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      color: white;
      font-size: 3rem;
      box-shadow: var(--shadow-md);
    }

    .profile-name {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .profile-email {
      font-size: 0.8rem;
      color: var(--gray-600);
      margin-bottom: 0.5rem;
    }

    .profile-role {
      display: inline-block;
      background: #EEF2FF;
      color: var(--primary);
      padding: 0.25rem 1rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .btn-edit {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 0.6rem 1.5rem;
      border-radius: 40px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }

    .btn-edit:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 12px rgba(91, 33, 182, 0.3);
    }

    /* Stats Grid untuk Main Content */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: white;
      border-radius: var(--border-radius-card);
      padding: 1.5rem;
      text-align: center;
      border: 1px solid var(--gray-200);
      transition: all 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .stat-icon {
      width: 48px;
      height: 48px;
      background: #EEF2FF;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }

    .stat-icon i {
      font-size: 1.5rem;
      color: var(--primary);
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--gray-800);
    }

    .stat-label {
      font-size: 0.875rem;
      color: var(--gray-600);
      margin-top: 0.25rem;
    }

    /* Info Card */
    .info-card {
      background: white;
      border-radius: var(--border-radius-card);
      padding: 1.5rem;
      border: 1px solid var(--gray-200);
      margin-bottom: 1.5rem;
    }

    .info-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-bottom: 2px solid var(--gray-200);
      padding-bottom: 0.5rem;
    }

    .info-title i {
      color: var(--primary);
    }

    .info-row {
      display: flex;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--gray-100);
    }

    .info-label {
      width: 140px;
      font-weight: 600;
      color: var(--gray-600);
    }

    .info-value {
      flex: 1;
      color: var(--gray-800);
    }

    .info-row:last-child {
      border-bottom: none;
    }

    /* Recent Activity */
    .activity-list {
      margin-top: 0.5rem;
    }

    .activity-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--gray-100);
    }

    .activity-icon {
      width: 32px;
      height: 32px;
      background: var(--gray-100);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
    }

    .activity-detail {
      flex: 1;
    }

    .activity-title {
      font-size: 0.875rem;
      font-weight: 500;
    }

    .activity-date {
      font-size: 0.7rem;
      color: var(--gray-600);
    }

    /* Quick Actions */
    .quick-actions {
      margin-top: 1rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn-action {
      background: var(--gray-100);
      padding: 0.5rem 1rem;
      border-radius: 40px;
      text-decoration: none;
      color: var(--gray-600);
      font-size: 0.8rem;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-action:hover {
      background: var(--primary);
      color: white;
    }

    /* Hamburger */
    .hamburger {
      display: none;
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 60;
      background: white;
      border: none;
      font-size: 1.5rem;
      padding: 0.5rem;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
    }

    @media (max-width: 1024px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        width: 260px;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .main-content {
        margin-left: 0;
        padding: 1.5rem;
        padding-top: 4rem;
      }

      .hamburger {
        display: block;
      }

      .profile-wrapper {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }

      .info-row {
        flex-direction: column;
        gap: 0.25rem;
      }

      .info-label {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
  <div class="app">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="page-header">
        <h1>👤 Profil Admin</h1>
        <p>Lihat dan kelola informasi profil admin</p>
      </div>

      <div id="profileContent"></div>

      <div class="quick-actions">
        <a href="dashboard-admin.html" class="btn-action"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="analitik.html" class="btn-action"><i class="fas fa-chart-pie"></i> Analitik</a>
        <a href="kelola-pengguna.html" class="btn-action"><i class="fas fa-users"></i> Kelola Pengguna</a>
        <a href="kelola-modul.html" class="btn-action"><i class="fas fa-book"></i> Kelola Modul</a>
      </div>
    </main>
  </div>

  <script>
    (function () {
      // Cek login admin
      const currentUser = JSON.parse(localStorage.getItem('currentUser'));
      if (!currentUser || currentUser.role !== 'admin') {
        window.location = 'login.html';
        return;
      }

      // Ambil data tambahan
      let users = JSON.parse(localStorage.getItem('users')) || [];
      let modules = JSON.parse(localStorage.getItem('modules')) || [];
      let articles = JSON.parse(localStorage.getItem('articles')) || [];
      let quizzes = JSON.parse(localStorage.getItem('quizzes')) || [];
      let products = JSON.parse(localStorage.getItem('products')) || [];
      let forums = JSON.parse(localStorage.getItem('forums')) || [];

      // Hitung statistik
      const totalStudents = users.filter(u => u.role === 'siswa').length;
      const totalAdmins = users.filter(u => u.role === 'admin').length;
      const totalModules = modules.length;
      const totalArticles = articles.length;
      const totalQuizzes = quizzes.length;
      const totalProducts = products.length;
      const totalForums = forums.length;
      const totalContent = totalModules + totalArticles + totalQuizzes + totalProducts;

      // Data aktivitas terbaru (dari berbagai sumber)
      let recentActivities = [];

      // Ambil artikel terbaru
      const recentArticles = [...articles].sort((a, b) => {
        const dateA = new Date(a.date?.split(' ').reverse().join('-') || 0);
        const dateB = new Date(b.date?.split(' ').reverse().join('-') || 0);
        return dateB - dateA;
      }).slice(0, 3);
      recentArticles.forEach(a => {
        recentActivities.push({
          title: `Menambahkan artikel: ${a.title}`,
          type: 'article',
          date: a.date || 'Baru saja'
        });
      });

      // Ambil modul terbaru
      const recentModules = [...modules].sort((a, b) => b.id - a.id).slice(0, 2);
      recentModules.forEach(m => {
        recentActivities.push({
          title: `Menambahkan modul: ${m.title}`,
          type: 'module',
          date: 'Baru saja'
        });
      });

      // Ambil produk terbaru
      const recentProducts = [...products].sort((a, b) => b.id - a.id).slice(0, 2);
      recentProducts.forEach(p => {
        recentActivities.push({
          title: `Menambahkan produk: ${p.name}`,
          type: 'product',
          date: 'Baru saja'
        });
      });

      // Batasi aktivitas terbaru
      recentActivities = recentActivities.slice(0, 6);

      function getInitial(name) {
        return name ? name.charAt(0).toUpperCase() : 'A';
      }

      function getActivityIcon(type) {
        switch (type) {
          case 'article':
            return '<i class="fas fa-newspaper"></i>';
          case 'module':
            return '<i class="fas fa-book"></i>';
          case 'product':
            return '<i class="fas fa-gift"></i>';
          default:
            return '<i class="fas fa-bell"></i>';
        }
      }

      function renderProfile() {
        const html = `
          <div class="profile-wrapper">
            <!-- Sidebar Profil -->
            <div class="profile-sidebar">
              <div class="avatar">
                <i class="fas fa-user-shield"></i>
              </div>
              <div class="profile-name">${escapeHtml(currentUser.name)}</div>
              <div class="profile-email">${escapeHtml(currentUser.email)}</div>
              <div class="profile-role">
                <i class="fas fa-shield-alt"></i> Administrator
              </div>
              <a href="edit-profil-admin.html" class="btn-edit">
                <i class="fas fa-edit"></i> Edit Profil
              </a>
            </div>

            <!-- Konten Utama -->
            <div>
              <!-- Statistik -->
              <div class="stats-grid">
                <div class="stat-card">
                  <div class="stat-icon"><i class="fas fa-users"></i></div>
                  <div class="stat-value">${totalStudents}</div>
                  <div class="stat-label">Total Siswa</div>
                </div>
                <div class="stat-card">
                  <div class="stat-icon"><i class="fas fa-user-shield"></i></div>
                  <div class="stat-value">${totalAdmins}</div>
                  <div class="stat-label">Total Admin</div>
                </div>
                <div class="stat-card">
                  <div class="stat-icon"><i class="fas fa-book"></i></div>
                  <div class="stat-value">${totalContent}</div>
                  <div class="stat-label">Total Konten</div>
                </div>
              </div>

              <!-- Informasi Pribadi -->
              <div class="info-card">
                <div class="info-title">
                  <i class="fas fa-id-card"></i> Informasi Admin
                </div>
                <div class="info-row">
                  <div class="info-label">Nama Lengkap</div>
                  <div class="info-value">${escapeHtml(currentUser.name)}</div>
                </div>
                <div class="info-row">
                  <div class="info-label">Email</div>
                  <div class="info-value">${escapeHtml(currentUser.email)}</div>
                </div>
                <div class="info-row">
                  <div class="info-label">Role</div>
                  <div class="info-value">Administrator</div>
                </div>
                <div class="info-row">
                  <div class="info-label">Bergabung Sejak</div>
                  <div class="info-value">${new Date(currentUser.id || Date.now()).toLocaleDateString('id-ID')}</div>
                </div>
              </div>

              <!-- Statistik Konten -->
              <div class="info-card">
                <div class="info-title">
                  <i class="fas fa-chart-line"></i> Statistik Konten
                </div>
                <div class="info-row">
                  <div class="info-label">Modul Pembelajaran</div>
                  <div class="info-value"><strong>${totalModules}</strong> modul</div>
                </div>
                <div class="info-row">
                  <div class="info-label">Artikel Edukatif</div>
                  <div class="info-value"><strong>${totalArticles}</strong> artikel</div>
                </div>
                <div class="info-row">
                  <div class="info-label">Kuis Interaktif</div>
                  <div class="info-value"><strong>${totalQuizzes}</strong> kuis</div>
                </div>
                <div class="info-row">
                  <div class="info-label">Produk Hadiah</div>
                  <div class="info-value"><strong>${totalProducts}</strong> produk</div>
                </div>
                <div class="info-row">
                  <div class="info-label">Forum Diskusi</div>
                  <div class="info-value"><strong>${totalForums}</strong> topik</div>
                </div>
              </div>

              <!-- Aktivitas Terbaru -->
              <div class="info-card">
                <div class="info-title">
                  <i class="fas fa-history"></i> Aktivitas Terbaru
                </div>
                ${recentActivities.length > 0 ? `
                  <div class="activity-list">
                    ${recentActivities.map(act => `
                      <div class="activity-item">
                        <div class="activity-icon">
                          ${getActivityIcon(act.type)}
                        </div>
                        <div class="activity-detail">
                          <div class="activity-title">${escapeHtml(act.title)}</div>
                          <div class="activity-date">${act.date}</div>
                        </div>
                      </div>
                    `).join('')}
                  </div>
                ` : `
                  <p style="color: var(--gray-600); text-align: center;">Belum ada aktivitas terbaru</p>
                `}
              </div>
            </div>
          </div>
        `;

        document.getElementById('profileContent').innerHTML = html;
      }

      function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      renderProfile();

      // Sidebar HTML lengkap
      const sidebarHtml = `
        <div class="sidebar-header">
          <div class="logo-icon"><i class="fas fa-feather-alt"></i></div>
          <div class="logo-text">LenteraNusa</div>
          <small style="margin-left:auto; font-size:10px; color:var(--primary);">Admin</small>
        </div>
        <ul class="sidebar-menu">
          <li><a href="dashboard-admin.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
          <li><a href="analitik.html"><i class="fas fa-chart-pie"></i> Analitik</a></li>
          <li><a href="kelola-artikel.html"><i class="fas fa-newspaper"></i> Kelola Artikel</a></li>
          <li><a href="kelola-produk.html"><i class="fas fa-gift"></i> Kelola Produk</a></li>
          <li><a href="kelola-pengguna.html"><i class="fas fa-users"></i> Kelola Pengguna</a></li>
          <li><a href="kelola-transaksi.html"><i class="fas fa-credit-card"></i> Kelola Transaksi</a></li>
          <li><a href="kelola-modul.html"><i class="fas fa-book"></i> Kelola Modul</a></li>
          <li><a href="kelola-badge.html"><i class="fas fa-medal"></i> Kelola Badge</a></li>
          <li><a href="kelola-forum.html"><i class="fas fa-comments"></i> Kelola Forum</a></li>
          <li><a href="kelola-kuis.html"><i class="fas fa-question-circle"></i> Kelola Kuis</a></li>
          <li class="active"><a href="profil-admin.html"><i class="fas fa-user-shield"></i> Profil</a></li>
          <li><a href="pengaturan-admin.html"><i class="fas fa-cog"></i> Pengaturan</a></li>
          <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Keluar</a></li>
        </ul>
      `;

      const sidebar = document.querySelector('.sidebar');
      if (sidebar) sidebar.innerHTML = sidebarHtml;

      // Logout
      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
          localStorage.removeItem('currentUser');
          window.location = 'login.html';
        });
      }

      // Hamburger menu
      const hamburger = document.getElementById('hamburger');
      const sidebarElement = document.getElementById('sidebar');
      if (hamburger && sidebarElement) {
        hamburger.addEventListener('click', () => sidebarElement.classList.toggle('open'));
      }

      // Tutup sidebar saat klik di luar (mobile)
      document.addEventListener('click', (e) => {
        if (window.innerWidth <= 768) {
          if (sidebarElement && hamburger && !sidebarElement.contains(e.target) && !hamburger.contains(e.target)) {
            sidebarElement.classList.remove('open');
          }
        }
      });
    })();
  </script>
</body>
</html>
