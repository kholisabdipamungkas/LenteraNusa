<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Edit Profil | LenteraNusa</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter', sans-serif; background:#F8FAFC; color:#0F172A; }
    :root { 
      --primary:#5B21B6; 
      --primary-dark:#4C1D95; 
      --secondary:#2563EB;
      --gray-100:#F1F5F9;
      --gray-200:#E2E8F0; 
      --gray-600:#475569; 
      --gray-800:#1E293B;
      --card-bg:#FFFFFF; 
      --shadow-sm:0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md:0 4px 6px -1px rgb(0 0 0 / 0.1);
      --border-radius-card:20px;
    }
    .app { display: flex; min-height: 100vh; }
    .sidebar { 
      width:280px; background:var(--card-bg); border-right:1px solid var(--gray-200);
      position:fixed; top:0; bottom:0; left:0; z-index:50; transition:transform 0.2s ease;
      overflow-y:auto; padding:1.5rem; 
    }
    .sidebar-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:2rem; padding-bottom:1rem; border-bottom:1px solid var(--gray-200); }
    .logo-icon { background:linear-gradient(135deg,var(--primary),var(--secondary)); width:36px; height:36px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:white; }
    .logo-text { font-family:'Poppins'; font-weight:700; font-size:1.25rem; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .sidebar-menu { list-style:none; margin-top:1rem; }
    .sidebar-menu li { margin-bottom:0.25rem; }
    .sidebar-menu a { display:flex; align-items:center; gap:0.75rem; padding:0.75rem 1rem; border-radius:12px; color:var(--gray-600); font-weight:500; text-decoration:none; transition:all 0.2s; }
    .sidebar-menu a:hover { background:var(--gray-100); color:var(--primary); }
    .sidebar-menu .active a { background:#EEF2FF; color:var(--primary); }
    .sidebar-menu i { width:1.25rem; }
    .main-content { flex:1; margin-left:280px; padding:2rem; }
    .hamburger { display:none; position:fixed; top:1rem; left:1rem; z-index:60; background:white; border:none; font-size:1.5rem; padding:0.5rem; border-radius:12px; cursor:pointer; box-shadow:var(--shadow-sm); }
    
    /* Page Header */
    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-size: 1.875rem; font-weight: 600; margin-bottom: 0.5rem; }
    .page-header p { color: var(--gray-600); }
    
    /* Back Link */
    .back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--gray-600); text-decoration: none; margin-bottom: 1.5rem; transition: 0.2s; }
    .back-link:hover { color: var(--primary); }
    
    /* Form Card */
    .form-card { background: white; border-radius: var(--border-radius-card); padding: 2rem; border: 1px solid var(--gray-200); box-shadow: var(--shadow-sm); max-width: 550px; margin: 0 auto; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--gray-800); }
    .form-group label i { margin-right: 0.5rem; color: var(--primary); }
    .form-group input, 
    .form-group select { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--gray-200); border-radius: 12px; font-family: inherit; font-size: 0.9rem; transition: 0.2s; background: #FEF9F0; }
    .form-group input:focus, 
    .form-group select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(91,33,182,0.1); }
    .form-hint { font-size: 0.7rem; color: var(--gray-600); margin-top: 0.25rem; }
    
    /* Avatar Preview */
    .avatar-preview { text-align: center; margin-bottom: 2rem; }
    .avatar-circle { width: 100px; height: 100px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 0.5rem; color: white; font-size: 2.5rem; font-weight: 600; box-shadow: var(--shadow-md); }
    .avatar-note { font-size: 0.7rem; color: var(--gray-600); }
    
    /* Form Actions */
    .form-actions { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }
    .btn-save { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 0.75rem 2rem; border-radius: 40px; cursor: pointer; font-weight: 600; font-size: 1rem; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; }
    .btn-save:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(91,33,182,0.3); }
    .btn-cancel { background: var(--gray-100); color: var(--gray-600); border: none; padding: 0.75rem 2rem; border-radius: 40px; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; transition: 0.2s; }
    .btn-cancel:hover { background: var(--gray-200); }
    
    @media (max-width:768px) {
      .sidebar { transform: translateX(-100%); width:260px; }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left:0; padding:1.5rem; padding-top:4rem; }
      .hamburger { display:block; }
      .form-card { padding: 1.5rem; }
      .form-actions { flex-direction: column; }
      .btn-save, .btn-cancel { justify-content: center; }
    }
  </style>
</head>
<body>
<button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <a href="profil-siswa.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Profil</a>
    
    <div class="page-header">
      <h1>✏️ Edit Profil</h1>
      <p>Perbarui informasi profil kamu di sini</p>
    </div>
    
    <div class="form-card">
      <div class="avatar-preview">
        <div class="avatar-circle" id="avatarPreview">S</div>
        <div class="avatar-note"><i class="fas fa-info-circle"></i> Avatar diambil dari inisial nama</div>
      </div>
      
      <form id="editForm">
        <div class="form-group">
          <label><i class="fas fa-user"></i> Nama Lengkap</label>
          <input type="text" id="name" placeholder="Masukkan nama lengkap" required>
          <div class="form-hint">Nama akan ditampilkan di profil dan leaderboard</div>
        </div>
        
        <div class="form-group">
          <label><i class="fas fa-graduation-cap"></i> Jenjang Pendidikan</label>
          <select id="jenjang">
            <option value="SD">SD (Sekolah Dasar)</option>
            <option value="SMP">SMP (Sekolah Menengah Pertama)</option>
            <option value="SMA">SMA (Sekolah Menengah Atas)</option>
          </select>
          <div class="form-hint">Pilih jenjang pendidikan saat ini</div>
        </div>
        
        <div class="form-group">
          <label><i class="fas fa-school"></i> Asal Sekolah</label>
          <input type="text" id="school" placeholder="Contoh: SD Negeri 1 Jakarta">
          <div class="form-hint">Isi nama sekolah kamu (opsional)</div>
        </div>
        
        <div class="form-actions">
          <button type="submit" class="btn-save"><i class="fas fa-save"></i> Simpan Perubahan</button>
          <a href="profil-siswa.html" class="btn-cancel"><i class="fas fa-times"></i> Batal</a>
        </div>
      </form>
    </div>
  </main>
</div>

<script>
  const currentUser = JSON.parse(localStorage.getItem('currentUser'));
  if (!currentUser || currentUser.role !== 'siswa') window.location = 'login.html';
  
  // Isi form dengan data user
  document.getElementById('name').value = currentUser.name || '';
  document.getElementById('jenjang').value = currentUser.jenjang || 'SD';
  document.getElementById('school').value = currentUser.school || '';
  
  // Update avatar preview saat nama berubah
  function updateAvatarPreview() {
    const name = document.getElementById('name').value;
    const initial = name ? name.charAt(0).toUpperCase() : 'S';
    document.getElementById('avatarPreview').innerText = initial;
  }
  
  document.getElementById('name').addEventListener('input', updateAvatarPreview);
  updateAvatarPreview();
  
  // Submit form
  document.getElementById('editForm').addEventListener('submit', (e) => {
    e.preventDefault();
    
    const newName = document.getElementById('name').value.trim();
    const newJenjang = document.getElementById('jenjang').value;
    const newSchool = document.getElementById('school').value.trim();
    
    if (newName === '') {
      alert('Nama lengkap tidak boleh kosong!');
      return;
    }
    
    let users = JSON.parse(localStorage.getItem('users'));
    let userIndex = users.findIndex(u => u.email === currentUser.email);
    
    if (userIndex !== -1) {
      users[userIndex].name = newName;
      users[userIndex].jenjang = newJenjang;
      users[userIndex].school = newSchool;
      
      localStorage.setItem('users', JSON.stringify(users));
      localStorage.setItem('currentUser', JSON.stringify(users[userIndex]));
      
      alert('✅ Profil berhasil diperbarui!');
      window.location.href = 'profil-siswa.html';
    } else {
      alert('Terjadi kesalahan. Silakan coba lagi.');
    }
  });
  
  // Sidebar lengkap
  const sidebarHtml = `
    <div class="sidebar-header"><div class="logo-icon"><i class="fas fa-feather-alt"></i></div><div class="logo-text">LenteraNusa</div></div>
    <ul class="sidebar-menu">
      <li><a href="dashboard-user.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li><a href="modul.html"><i class="fas fa-book-open"></i> Modul Belajar</a></li>
      <li><a href="paket-kuis.html"><i class="fas fa-question-circle"></i> Kuis</a></li>
      <li><a href="pencapaian-badge.html"><i class="fas fa-medal"></i> Pencapaian</a></li>
      <li><a href="leaderboard.html"><i class="fas fa-chart-line"></i> Leaderboard</a></li>
      <li><a href="toko-hadiah.html"><i class="fas fa-gift"></i> Toko Hadiah</a></li>
      <li><a href="artikel.html"><i class="fas fa-newspaper"></i> Artikel</a></li>
      <li><a href="forum.html"><i class="fas fa-comments"></i> Forum</a></li>
      <li class="active"><a href="profil-siswa.html"><i class="fas fa-user"></i> Profil</a></li>
      <li><a href="pengaturan-siswa.html"><i class="fas fa-cog"></i> Pengaturan</a></li>
      <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Keluar</a></li>
    </ul>
  `;
  document.querySelector('.sidebar').innerHTML = sidebarHtml;
  document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.removeItem('currentUser'); window.location='login.html'; });
  
  const hamburger = document.getElementById('hamburger'), sidebar = document.getElementById('sidebar');
  hamburger.addEventListener('click', () => sidebar.classList.toggle('open'));
  document.addEventListener('click', (e) => { if (window.innerWidth <= 768 && !sidebar.contains(e.target) && !hamburger.contains(e.target)) sidebar.classList.remove('open'); });
</script>
</body>
</html>
