<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kelola Badge | LenteraNusa Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter', sans-serif; background:#F8FAFC; color:#0F172A; }
    :root { 
      --primary:#5B21B6; 
      --primary-dark:#4C1D95; 
      --secondary:#2563EB;
      --gray-100:#F1F5F9;
      --gray-200:#E2E8F0; 
      --gray-600:#475569; 
      --gray-800:#1E293B;
      --card-bg:#FFFFFF; 
      --shadow-sm:0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md:0 4px 6px -1px rgb(0 0 0 / 0.1);
      --border-radius-card:20px;
    }
    .app { display: flex; min-height: 100vh; }
    .sidebar { 
      width:280px; background:var(--card-bg); border-right:1px solid var(--gray-200);
      position:fixed; top:0; bottom:0; left:0; z-index:50; transition:transform 0.2s ease;
      overflow-y:auto; padding:1.5rem; 
    }
    .sidebar-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:2rem; padding-bottom:1rem; border-bottom:1px solid var(--gray-200); }
    .logo-icon { background:linear-gradient(135deg,var(--primary),var(--secondary)); width:36px; height:36px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:white; }
    .logo-text { font-family:'Poppins'; font-weight:700; font-size:1.25rem; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .sidebar-menu { list-style:none; margin-top:1rem; }
    .sidebar-menu li { margin-bottom:0.25rem; }
    .sidebar-menu a { display:flex; align-items:center; gap:0.75rem; padding:0.75rem 1rem; border-radius:12px; color:var(--gray-600); font-weight:500; text-decoration:none; transition:all 0.2s; }
    .sidebar-menu a:hover { background:var(--gray-100); color:var(--primary); }
    .sidebar-menu .active a { background:#EEF2FF; color:var(--primary); }
    .sidebar-menu i { width:1.25rem; }
    .main-content { flex:1; margin-left:280px; padding:2rem; }
    .hamburger { display:none; position:fixed; top:1rem; left:1rem; z-index:60; background:white; border:none; font-size:1.5rem; padding:0.5rem; border-radius:12px; cursor:pointer; box-shadow:var(--shadow-sm); }
    
    /* Page Header */
    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-size: 1.875rem; font-weight: 600; margin-bottom: 0.5rem; }
    .page-header p { color: var(--gray-600); }
    
    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
    .stat-card { background: var(--card-bg); border-radius: var(--border-radius-card); padding: 1.5rem; box-shadow: var(--shadow-sm); border: 1px solid var(--gray-200); transition: all 0.2s; text-align: center; }
    .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
    .stat-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--gray-800); }
    .stat-label { font-size: 0.875rem; color: var(--gray-600); margin-top: 0.25rem; }
    
    /* Filter Bar */
    .filter-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; justify-content: space-between; align-items: center; }
    .search-wrapper { flex: 1; position: relative; max-width: 300px; }
    .search-wrapper i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--gray-600); }
    .search-input { width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; border: 1px solid var(--gray-200); border-radius: 40px; background: white; font-size: 0.875rem; transition: 0.2s; }
    .search-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(91,33,182,0.1); }
    .filter-select { padding: 0.75rem 1.5rem; border-radius: 40px; border: 1px solid var(--gray-200); background: white; font-size: 0.875rem; cursor: pointer; }
    .btn-add { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 0.75rem 1.5rem; border-radius: 40px; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 600; transition: all 0.2s; }
    .btn-add:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(91,33,182,0.3); }
    
    /* Table Styles */
    .table-container { background: white; border-radius: var(--border-radius-card); border: 1px solid var(--gray-200); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 1rem 1.25rem; text-align: left; border-bottom: 1px solid var(--gray-200); }
    th { background: var(--gray-100); font-weight: 600; color: var(--gray-600); font-size: 0.875rem; }
    td { color: var(--gray-800); font-size: 0.875rem; }
    tr:hover td { background: var(--gray-100); }
    .badge-status { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.7rem; font-weight: 600; display: inline-block; background: #D1FAE5; color: #065F46; }
    .rarity-common { color: #10B981; font-weight: 600; }
    .rarity-rare { color: #3B82F6; font-weight: 600; }
    .rarity-epic { color: #8B5CF6; font-weight: 600; }
    .rarity-legendary { color: #F59E0B; font-weight: 600; }
    .badge-icon { font-size: 1.8rem; display: inline-block; }
    .btn-edit, .btn-delete { padding: 0.5rem 0.75rem; border-radius: 8px; text-decoration: none; margin: 0 0.25rem; display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.75rem; font-weight: 500; transition: all 0.2s; border: none; cursor: pointer; }
    .btn-edit { background: #EEF2FF; color: var(--primary); }
    .btn-edit:hover { background: var(--primary); color: white; transform: translateY(-2px); }
    .btn-delete { background: #FEF2F2; color: #EF4444; }
    .btn-delete:hover { background: #EF4444; color: white; transform: translateY(-2px); }
    
    /* Empty State */
    .empty-state { text-align: center; padding: 3rem; color: var(--gray-600); }
    .empty-state i { font-size: 3rem; color: var(--gray-600); margin-bottom: 1rem; display: block; }
    
    /* Quick Actions */
    .quick-actions { margin-top: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; }
    .btn-action { background: var(--gray-100); padding: 0.5rem 1rem; border-radius: 40px; text-decoration: none; color: var(--gray-600); font-size: 0.8rem; transition: 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; }
    .btn-action:hover { background: var(--primary); color: white; }
    
    @media (max-width: 1024px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    }
    
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); width:260px; }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left:0; padding:1.5rem; padding-top:4rem; }
      .hamburger { display:block; }
      .stats-grid { grid-template-columns: 1fr; }
      .filter-bar { flex-direction: column; align-items: stretch; }
      .search-wrapper { max-width: none; }
      .table-container { overflow-x: auto; }
      table { font-size: 0.75rem; }
      th, td { padding: 0.75rem; }
      .btn-edit, .btn-delete { padding: 0.35rem 0.5rem; }
    }
  </style>
</head>
<body>
<button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <h1>🏅 Kelola Badge</h1>
      <p>Tambah, edit, atau hapus badge pencapaian siswa</p>
    </div>
    
    <!-- Statistik -->
    <div class="stats-grid" id="statsGrid"></div>
    
    <!-- Filter & Tombol Tambah -->
    <div class="filter-bar">
      <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" id="searchBadge" class="search-input" placeholder="Cari badge...">
      </div>
      <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
        <select id="rarityFilter" class="filter-select">
          <option value="">✨ Semua Rarity</option>
          <option value="COMMON">🥇 Common</option>
          <option value="RARE">⭐ Rare</option>
          <option value="EPIC">✨ Epic</option>
          <option value="LEGENDARY">👑 Legendary</option>
        </select>
        <a href="tambah-badge.html" class="btn-add"><i class="fas fa-plus"></i> Tambah Badge</a>
      </div>
    </div>
    
    <!-- Tabel Badge -->
    <div class="table-container">
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>No</th>
              <th>Icon</th>
              <th>Nama Badge</th>
              <th>Rarity</th>
              <th>Syarat</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="badgeList"></tbody>
        </table>
      </div>
    </div>
    
    <!-- Quick Actions -->
    <div class="quick-actions">
      <a href="dashboard-admin.html" class="btn-action"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="analitik.html" class="btn-action"><i class="fas fa-chart-pie"></i> Analitik</a>
      <a href="kelola-pengguna.html" class="btn-action"><i class="fas fa-users"></i> Kelola Pengguna</a>
      <a href="kelola-modul.html" class="btn-action"><i class="fas fa-book"></i> Kelola Modul</a>
    </div>
  </main>
</div>

<script>
  (function() {
    // Cek login admin
    var currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!currentUser || currentUser.role !== 'admin') {
      window.location = 'login.html';
      return;
    }
    
    // Data badge
    var badges = JSON.parse(localStorage.getItem('badges')) || [];
    
    // Data dummy jika kosong
    if (badges.length === 0) {
      badges = [
        { id: 1, name: "Pemula Rajin", rarity: "COMMON", syarat: "Selesaikan 5 modul", icon: "🥇", status: "Aktif" },
        { id: 2, name: "Pembaca Handal", rarity: "RARE", syarat: "Selesaikan 10 modul membaca", icon: "📖", status: "Aktif" },
        { id: 3, name: "Master Matematika", rarity: "EPIC", syarat: "Selesaikan 15 modul berhitung", icon: "🔢", status: "Aktif" },
        { id: 4, name: "Streak Master", rarity: "LEGENDARY", syarat: "Belajar 30 hari berturut-turut", icon: "🔥", status: "Aktif" },
        { id: 5, name: "Juara Kuis", rarity: "EPIC", syarat: "Raih skor 100% di 5 kuis", icon: "🏆", status: "Aktif" },
        { id: 6, name: "Konsisten Belajar", rarity: "RARE", syarat: "Belajar 7 hari berturut-turut", icon: "⭐", status: "Aktif" }
      ];
      localStorage.setItem('badges', JSON.stringify(badges));
    }
    
    // Hitung statistik
    var commonCount = badges.filter(function(b) { return b.rarity === 'COMMON'; }).length;
    var rareCount = badges.filter(function(b) { return b.rarity === 'RARE'; }).length;
    var epicCount = badges.filter(function(b) { return b.rarity === 'EPIC'; }).length;
    var legendaryCount = badges.filter(function(b) { return b.rarity === 'LEGENDARY'; }).length;
    var totalBadges = badges.length;
    
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card">
        <div class="stat-icon">🏅</div>
        <div class="stat-value">${totalBadges}</div>
        <div class="stat-label">Total Badge</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🥇</div>
        <div class="stat-value">${commonCount}</div>
        <div class="stat-label">Common</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⭐</div>
        <div class="stat-value">${rareCount}</div>
        <div class="stat-label">Rare</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">👑</div>
        <div class="stat-value">${legendaryCount + epicCount}</div>
        <div class="stat-label">Epic + Legendary</div>
      </div>
    `;
    
    // Fungsi untuk mendapatkan class rarity
    function getRarityClass(rarity) {
      if (rarity === 'COMMON') return 'rarity-common';
      if (rarity === 'RARE') return 'rarity-rare';
      if (rarity === 'EPIC') return 'rarity-epic';
      return 'rarity-legendary';
    }
    
    function getRarityIcon(rarity) {
      if (rarity === 'COMMON') return '🥇';
      if (rarity === 'RARE') return '⭐';
      if (rarity === 'EPIC') return '✨';
      return '👑';
    }
    
    // Fungsi render tabel
    function renderBadges() {
      var search = document.getElementById('searchBadge').value.toLowerCase();
      var rarityFilter = document.getElementById('rarityFilter').value;
      
      var filtered = badges.filter(function(b) {
        var matchSearch = b.name.toLowerCase().includes(search) || b.syarat.toLowerCase().includes(search);
        var matchRarity = rarityFilter === '' || b.rarity === rarityFilter;
        return matchSearch && matchRarity;
      });
      
      var html = '';
      if (filtered.length === 0) {
        html = '<tr><td colspan="7" class="empty-state"><i class="fas fa-medal"></i>Belum ada badge</td></tr>';
      } else {
        for (var i = 0; i < filtered.length; i++) {
          var b = filtered[i];
          var rarityClass = getRarityClass(b.rarity);
          var rarityIcon = getRarityIcon(b.rarity);
          
          html += `
            <tr>
              <td>${i + 1}</td>
              <td><span class="badge-icon">${b.icon || '🏅'}</span></td>
              <td><strong>${escapeHtml(b.name)}</strong></td>
              <td><span class="${rarityClass}">${rarityIcon} ${b.rarity}</span></td>
              <td>${escapeHtml(b.syarat)}</td>
              <td><span class="badge-status">${b.status || 'Aktif'}</span></td>
              <td>
                <a href="tambah-badge.html?id=${b.id}" class="btn-edit"><i class="fas fa-edit"></i> Edit</a>
                <button class="btn-delete" data-id="${b.id}"><i class="fas fa-trash"></i> Hapus</button>
              </td>
            </tr>
          `;
        }
      }
      document.getElementById('badgeList').innerHTML = html;
      
      // Event listener untuk tombol hapus
      var deleteBtns = document.querySelectorAll('.btn-delete');
      for (var j = 0; j < deleteBtns.length; j++) {
        deleteBtns[j].addEventListener('click', function() {
          var id = parseInt(this.getAttribute('data-id'));
          if (confirm('Apakah Anda yakin ingin menghapus badge ini?')) {
            badges = badges.filter(function(b) { return b.id !== id; });
            localStorage.setItem('badges', JSON.stringify(badges));
            
            // Update statistik
            var newCommon = badges.filter(function(b) { return b.rarity === 'COMMON'; }).length;
            var newRare = badges.filter(function(b) { return b.rarity === 'RARE'; }).length;
            var newEpic = badges.filter(function(b) { return b.rarity === 'EPIC'; }).length;
            var newLegendary = badges.filter(function(b) { return b.rarity === 'LEGENDARY'; }).length;
            var newTotal = badges.length;
            
            document.querySelector('.stats-grid .stat-card:nth-child(1) .stat-value').innerText = newTotal;
            document.querySelector('.stats-grid .stat-card:nth-child(2) .stat-value').innerText = newCommon;
            document.querySelector('.stats-grid .stat-card:nth-child(3) .stat-value').innerText = newRare;
            document.querySelector('.stats-grid .stat-card:nth-child(4) .stat-value').innerText = newLegendary + newEpic;
            
            renderBadges();
          }
        });
      }
    }
    
    function escapeHtml(text) {
      if (!text) return '';
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Event listener untuk filter dan search
    document.getElementById('searchBadge').addEventListener('input', renderBadges);
    document.getElementById('rarityFilter').addEventListener('change', renderBadges);
    
    // Render awal
    renderBadges();
    
    // Sidebar HTML lengkap
    var sidebarHtml = `
      <div class="sidebar-header">
        <div class="logo-icon"><i class="fas fa-feather-alt"></i></div>
        <div class="logo-text">LenteraNusa</div>
        <small style="margin-left:auto; font-size:10px; color:var(--primary);">Admin</small>
      </div>
      <ul class="sidebar-menu">
        <li><a href="dashboard-admin.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
        <li><a href="analitik.html"><i class="fas fa-chart-pie"></i> Analitik</a></li>
        <li><a href="kelola-artikel.html"><i class="fas fa-newspaper"></i> Kelola Artikel</a></li>
        <li><a href="kelola-produk.html"><i class="fas fa-gift"></i> Kelola Produk</a></li>
        <li><a href="kelola-pengguna.html"><i class="fas fa-users"></i> Kelola Pengguna</a></li>
        <li><a href="kelola-transaksi.html"><i class="fas fa-credit-card"></i> Kelola Transaksi</a></li>
        <li><a href="kelola-modul.html"><i class="fas fa-book"></i> Kelola Modul</a></li>
        <li class="active"><a href="kelola-badge.html"><i class="fas fa-medal"></i> Kelola Badge</a></li>
        <li><a href="kelola-forum.html"><i class="fas fa-comments"></i> Kelola Forum</a></li>
        <li><a href="kelola-kuis.html"><i class="fas fa-question-circle"></i> Kelola Kuis</a></li>
        <li><a href="profil-admin.html"><i class="fas fa-user-shield"></i> Profil</a></li>
        <li><a href="pengaturan-admin.html"><i class="fas fa-cog"></i> Pengaturan</a></li>
        <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Keluar</a></li>
      </ul>
    `;
    
    var sidebar = document.querySelector('.sidebar');
    if (sidebar) sidebar.innerHTML = sidebarHtml;
    
    // Logout
    var logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
      logoutBtn.addEventListener('click', function() { 
        localStorage.removeItem('currentUser'); 
        window.location = 'login.html'; 
      });
    }
    
    // Hamburger menu
    var hamburger = document.getElementById('hamburger');
    var sidebarElement = document.getElementById('sidebar');
    if (hamburger && sidebarElement) {
      hamburger.addEventListener('click', function() { 
        sidebarElement.classList.toggle('open'); 
      });
    }
    
    // Tutup sidebar saat klik di luar (mobile)
    document.addEventListener('click', function(e) {
      if (window.innerWidth <= 768) {
        if (sidebarElement && hamburger && !sidebarElement.contains(e.target) && !hamburger.contains(e.target)) {
          sidebarElement.classList.remove('open');
        }
      }
    });
  })();
</script>
</body>
</html>
