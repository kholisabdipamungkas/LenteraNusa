<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Forum Diskusi | LenteraNusa</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter', sans-serif; background:#F8FAFC; color:#0F172A; }
    :root { 
      --primary:#5B21B6; 
      --primary-dark:#4C1D95; 
      --secondary:#2563EB;
      --gray-100:#F1F5F9;
      --gray-200:#E2E8F0; 
      --gray-600:#475569; 
      --gray-800:#1E293B;
      --card-bg:#FFFFFF; 
      --shadow-sm:0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md:0 4px 6px -1px rgb(0 0 0 / 0.1);
      --border-radius-card:20px;
    }
    .app { display: flex; min-height: 100vh; }
    .sidebar { 
      width:280px; background:var(--card-bg); border-right:1px solid var(--gray-200);
      position:fixed; top:0; bottom:0; left:0; z-index:50; transition:transform 0.2s ease;
      overflow-y:auto; padding:1.5rem; 
    }
    .sidebar-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:2rem; padding-bottom:1rem; border-bottom:1px solid var(--gray-200); }
    .logo-icon { background:linear-gradient(135deg,var(--primary),var(--secondary)); width:36px; height:36px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:white; }
    .logo-text { font-family:'Poppins'; font-weight:700; font-size:1.25rem; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .sidebar-menu { list-style:none; margin-top:1rem; }
    .sidebar-menu li { margin-bottom:0.25rem; }
    .sidebar-menu a { display:flex; align-items:center; gap:0.75rem; padding:0.75rem 1rem; border-radius:12px; color:var(--gray-600); font-weight:500; text-decoration:none; transition:all 0.2s; }
    .sidebar-menu a:hover { background:var(--gray-100); color:var(--primary); }
    .sidebar-menu .active a { background:#EEF2FF; color:var(--primary); }
    .sidebar-menu i { width:1.25rem; }
    .main-content { flex:1; margin-left:280px; padding:2rem; }
    .hamburger { display:none; position:fixed; top:1rem; left:1rem; z-index:60; background:white; border:none; font-size:1.5rem; padding:0.5rem; border-radius:12px; cursor:pointer; box-shadow:var(--shadow-sm); }
    
    /* Page Header */
    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-size: 1.875rem; font-weight: 600; margin-bottom: 0.5rem; }
    .page-header p { color: var(--gray-600); }
    
    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: white; border-radius: var(--border-radius-card); padding: 1rem; text-align: center; border: 1px solid var(--gray-200); }
    .stat-card .value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .stat-card .label { font-size: 0.7rem; color: var(--gray-600); margin-top: 0.25rem; }
    
    /* Forum Header */
    .forum-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
    .btn-new { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 0.6rem 1.2rem; border-radius: 40px; text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 0.5rem; transition: all 0.2s; }
    .btn-new:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(91,33,182,0.3); }
    
    /* Filter Bar */
    .filter-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .search-wrapper { flex: 1; position: relative; }
    .search-wrapper i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--gray-600); }
    .search-input { width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; border: 1px solid var(--gray-200); border-radius: 40px; background: white; font-size: 0.875rem; transition: 0.2s; }
    .search-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(91,33,182,0.1); }
    .filter-select { padding: 0.75rem 1.5rem; border-radius: 40px; border: 1px solid var(--gray-200); background: white; font-size: 0.875rem; cursor: pointer; }
    
    /* Forum Card */
    .forum-card { background: white; border-radius: var(--border-radius-card); padding: 1.5rem; margin-bottom: 1rem; border: 1px solid var(--gray-200); transition: all 0.2s; }
    .forum-card:hover { transform: translateX(4px); box-shadow: var(--shadow-sm); }
    .forum-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
    .forum-title a { color: var(--gray-800); text-decoration: none; transition: 0.2s; }
    .forum-title a:hover { color: var(--primary); }
    .forum-meta { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.75rem; font-size: 0.7rem; color: var(--gray-600); }
    .forum-category { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.65rem; background: #EEF2FF; color: var(--primary); }
    .forum-excerpt { font-size: 0.85rem; color: var(--gray-600); margin-bottom: 1rem; line-height: 1.5; }
    .forum-stats { display: flex; align-items: center; gap: 1rem; font-size: 0.7rem; color: var(--gray-600); }
    .forum-stats i { margin-right: 0.25rem; }
    .forum-stats .replies { color: var(--primary); }
    
    /* Empty State */
    .empty-state { text-align: center; padding: 3rem; background: white; border-radius: var(--border-radius-card); border: 1px solid var(--gray-200); }
    .empty-state i { font-size: 3rem; color: var(--gray-600); margin-bottom: 1rem; display: block; }
    .empty-state h3 { margin-bottom: 0.5rem; }
    .empty-state p { color: var(--gray-600); margin-bottom: 1rem; }
    
    @media (max-width:768px) {
      .sidebar { transform: translateX(-100%); width:260px; }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left:0; padding:1.5rem; padding-top:4rem; }
      .hamburger { display:block; }
      .stats-grid { grid-template-columns: 1fr; gap: 0.75rem; }
      .filter-bar { flex-direction: column; }
      .forum-header { flex-direction: column; align-items: stretch; }
      .btn-new { text-align: center; justify-content: center; }
    }
  </style>
</head>
<body>
<button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <h1>💬 Forum Diskusi</h1>
      <p>Diskusikan materi pelajaran, tanyakan hal yang belum dipahami, dan berbagi pengetahuan</p>
    </div>
    
    <div class="stats-grid" id="statsGrid"></div>
    
    <div class="forum-header">
      <div></div>
      <a href="tambah-diskusi.html" class="btn-new"><i class="fas fa-plus"></i> Buat Diskusi Baru</a>
    </div>
    
    <div class="filter-bar">
      <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" id="searchForum" class="search-input" placeholder="Cari diskusi...">
      </div>
      <select id="categoryFilter" class="filter-select">
        <option value="">📂 Semua Kategori</option>
        <option value="Matematika">📐 Matematika</option>
        <option value="Bahasa Indonesia">📖 Bahasa Indonesia</option>
        <option value="Bahasa Inggris">🇬🇧 Bahasa Inggris</option>
        <option value="IPA">🔬 IPA</option>
        <option value="IPS">🌍 IPS</option>
        <option value="Tips Belajar">💡 Tips Belajar</option>
        <option value="Umum">🗣️ Umum</option>
      </select>
    </div>
    
    <div id="forumList"></div>
  </main>
</div>

<script>
  const currentUser = JSON.parse(localStorage.getItem('currentUser'));
  if (!currentUser || currentUser.role !== 'siswa') window.location = 'login.html';
  
  let forums = JSON.parse(localStorage.getItem('forums')) || [];
  if (forums.length === 0) {
    forums = [
      { id: 1, title: "Bagaimana cara mengatasi kesulitan belajar matematika?", author: "Siti Nurhaliza", category: "Matematika", date: "15 Desember 2024", replies: 12, views: 234, content: "Saya sering kesulitan aljabar, terutama saat mengerjakan soal cerita. Ada tips dari teman-teman?" },
      { id: 2, title: "Tips meningkatkan kemampuan menulis karangan", author: "Budi Santoso", category: "Bahasa Indonesia", date: "14 Desember 2024", replies: 8, views: 156, content: "Saya ingin meningkatkan kemampuan menulis karangan. Apa tips yang efektif?" },
      { id: 3, title: "Rekomendasi aplikasi belajar bahasa Inggris gratis", author: "Ahmad Fauzi", category: "Bahasa Inggris", date: "13 Desember 2024", replies: 15, views: 312, content: "Ada rekomendasi aplikasi belajar bahasa Inggris yang bagus dan gratis?" },
      { id: 4, title: "Cara menghafal rumus fisika dengan cepat", author: "Dewi Putri", category: "IPA", date: "12 Desember 2024", replies: 6, views: 189, content: "Saya kesulitan menghafal rumus-rumus fisika. Ada metode yang efektif?" },
      { id: 5, title: "Diskusi tentang perubahan iklim", author: "Rizki Ramadhan", category: "IPS", date: "11 Desember 2024", replies: 23, views: 567, content: "Bagaimana dampak perubahan iklim terhadap kehidupan sehari-hari?" },
      { id: 6, title: "Teknik membaca cepat untuk ujian", author: "Tim LenteraNusa", category: "Tips Belajar", date: "10 Desember 2024", replies: 34, views: 892, content: "Berbagi tips membaca cepat untuk menghadapi ujian nasional." }
    ];
    localStorage.setItem('forums', JSON.stringify(forums));
  }
  
  // Hitung statistik
  let totalTopics = forums.length;
  let totalReplies = forums.reduce((sum, f) => sum + (f.replies || 0), 0);
  let totalViews = forums.reduce((sum, f) => sum + (f.views || 0), 0);
  
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="value">${totalTopics}</div>
      <div class="label">Topik Diskusi</div>
    </div>
    <div class="stat-card">
      <div class="value">${totalReplies}</div>
      <div class="label">Total Balasan</div>
    </div>
    <div class="stat-card">
      <div class="value">${totalViews.toLocaleString()}</div>
      <div class="label">Total Dibaca</div>
    </div>
  `;
  
  function getCategoryIcon(category) {
    const icons = {
      'Matematika': '📐',
      'Bahasa Indonesia': '📖',
      'Bahasa Inggris': '🇬🇧',
      'IPA': '🔬',
      'IPS': '🌍',
      'Tips Belajar': '💡',
      'Umum': '🗣️'
    };
    return icons[category] || '📌';
  }
  
  function renderForums(search = '', category = '') {
    let filtered = forums.filter(f => 
      f.title.toLowerCase().includes(search.toLowerCase()) && 
      (category === '' || f.category === category)
    );
    
    let html = '';
    if (filtered.length === 0) {
      html = `
        <div class="empty-state">
          <i class="fas fa-comments"></i>
          <h3>Tidak ada diskusi</h3>
          <p>Coba cari dengan kata kunci lain atau buat diskusi baru</p>
          <a href="tambah-diskusi.html" class="btn-new" style="display: inline-flex;">Buat Diskusi Baru</a>
        </div>
      `;
    } else {
      filtered.forEach(forum => {
        let excerpt = forum.content.substring(0, 100) + (forum.content.length > 100 ? '...' : '');
        
        html += `
          <div class="forum-card">
            <div class="forum-title">
              <a href="detail-forum.html?id=${forum.id}">${escapeHtml(forum.title)}</a>
            </div>
            <div class="forum-meta">
              <span class="forum-category">${getCategoryIcon(forum.category)} ${forum.category}</span>
              <span><i class="fas fa-user"></i> ${escapeHtml(forum.author)}</span>
              <span><i class="far fa-calendar-alt"></i> ${forum.date}</span>
            </div>
            <div class="forum-excerpt">${escapeHtml(excerpt)}</div>
            <div class="forum-stats">
              <span class="replies"><i class="fas fa-comment"></i> ${forum.replies} balasan</span>
              <span><i class="fas fa-eye"></i> ${forum.views.toLocaleString()} dilihat</span>
            </div>
          </div>
        `;
      });
    }
    document.getElementById('forumList').innerHTML = html;
  }
  
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
  
  renderForums();
  
  // Event filter
  document.getElementById('searchForum').addEventListener('input', e => 
    renderForums(e.target.value, document.getElementById('categoryFilter').value));
  document.getElementById('categoryFilter').addEventListener('change', e => 
    renderForums(document.getElementById('searchForum').value, e.target.value));
  
  // Sidebar
  const sidebarHtml = `
    <div class="sidebar-header"><div class="logo-icon"><i class="fas fa-feather-alt"></i></div><div class="logo-text">LenteraNusa</div></div>
    <ul class="sidebar-menu">
      <li><a href="dashboard-user.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li><a href="modul.html"><i class="fas fa-book-open"></i> Modul Belajar</a></li>
      <li><a href="paket-kuis.html"><i class="fas fa-question-circle"></i> Kuis</a></li>
      <li><a href="pencapaian-badge.html"><i class="fas fa-medal"></i> Pencapaian</a></li>
      <li><a href="leaderboard.html"><i class="fas fa-chart-line"></i> Leaderboard</a></li>
      <li><a href="toko-hadiah.html"><i class="fas fa-gift"></i> Toko Hadiah</a></li>
      <li><a href="artikel.html"><i class="fas fa-newspaper"></i> Artikel</a></li>
      <li class="active"><a href="forum.html"><i class="fas fa-comments"></i> Forum</a></li>
      <li><a href="profil-siswa.html"><i class="fas fa-user"></i> Profil</a></li>
      <li><a href="pengaturan-siswa.html"><i class="fas fa-cog"></i> Pengaturan</a></li>
      <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Keluar</a></li>
    </ul>
  `;
  document.querySelector('.sidebar').innerHTML = sidebarHtml;
  document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.removeItem('currentUser'); window.location='login.html'; });
  
  const hamburger = document.getElementById('hamburger'), sidebar = document.getElementById('sidebar');
  hamburger.addEventListener('click', () => sidebar.classList.toggle('open'));
  document.addEventListener('click', (e) => { if (window.innerWidth <= 768 && !sidebar.contains(e.target) && !hamburger.contains(e.target)) sidebar.classList.remove('open'); });
</script>
</body>
</html>
