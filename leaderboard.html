<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leaderboard | LenteraNusa</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter', sans-serif; background:#F8FAFC; color:#0F172A; }
    :root { 
      --primary:#5B21B6; 
      --primary-dark:#4C1D95; 
      --secondary:#2563EB;
      --gray-100:#F1F5F9;
      --gray-200:#E2E8F0; 
      --gray-600:#475569; 
      --gray-800:#1E293B;
      --card-bg:#FFFFFF; 
      --shadow-sm:0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md:0 4px 6px -1px rgb(0 0 0 / 0.1);
      --border-radius-card:20px;
    }
    .app { display: flex; min-height: 100vh; }
    .sidebar { 
      width:280px; background:var(--card-bg); border-right:1px solid var(--gray-200);
      position:fixed; top:0; bottom:0; left:0; z-index:50; transition:transform 0.2s ease;
      overflow-y:auto; padding:1.5rem; 
    }
    .sidebar-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:2rem; padding-bottom:1rem; border-bottom:1px solid var(--gray-200); }
    .logo-icon { background:linear-gradient(135deg,var(--primary),var(--secondary)); width:36px; height:36px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:white; }
    .logo-text { font-family:'Poppins'; font-weight:700; font-size:1.25rem; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .sidebar-menu { list-style:none; margin-top:1rem; }
    .sidebar-menu li { margin-bottom:0.25rem; }
    .sidebar-menu a { display:flex; align-items:center; gap:0.75rem; padding:0.75rem 1rem; border-radius:12px; color:var(--gray-600); font-weight:500; text-decoration:none; transition:all 0.2s; }
    .sidebar-menu a:hover { background:var(--gray-100); color:var(--primary); }
    .sidebar-menu .active a { background:#EEF2FF; color:var(--primary); }
    .sidebar-menu i { width:1.25rem; }
    .main-content { flex:1; margin-left:280px; padding:2rem; }
    .hamburger { display:none; position:fixed; top:1rem; left:1rem; z-index:60; background:white; border:none; font-size:1.5rem; padding:0.5rem; border-radius:12px; cursor:pointer; box-shadow:var(--shadow-sm); }
    
    /* Page Header */
    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-size: 1.875rem; font-weight: 600; margin-bottom: 0.5rem; }
    .page-header p { color: var(--gray-600); }
    
    /* User Rank Card */
    .user-rank-card { background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: var(--border-radius-card); padding: 1.5rem 2rem; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; color: white; }
    .user-info .label { font-size: 0.75rem; opacity: 0.8; margin-bottom: 0.25rem; }
    .user-info .name { font-size: 1.25rem; font-weight: 600; }
    .user-info .school { font-size: 0.7rem; opacity: 0.8; margin-top: 0.25rem; }
    .rank-info { text-align: center; }
    .rank-info .rank-number { font-size: 2rem; font-weight: 800; }
    .rank-info .rank-label { font-size: 0.7rem; opacity: 0.8; }
    .points-info { text-align: center; }
    .points-info .points { font-size: 1.5rem; font-weight: 700; }
    .points-info .points-label { font-size: 0.7rem; opacity: 0.8; }
    
    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: white; border-radius: var(--border-radius-card); padding: 1rem; text-align: center; border: 1px solid var(--gray-200); }
    .stat-card .value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .stat-card .label { font-size: 0.7rem; color: var(--gray-600); margin-top: 0.25rem; }
    
    /* Tabs */
    .tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 2px solid var(--gray-200); padding-bottom: 0; }
    .tab-btn { padding: 0.75rem 1.5rem; cursor: pointer; font-weight: 600; border-radius: 40px 40px 0 0; transition: 0.2s; color: var(--gray-600); background: none; border: none; }
    .tab-btn.active { color: var(--primary); background: #EEF2FF; }
    .tab-btn:not(.active):hover { color: var(--primary); background: var(--gray-100); }
    
    /* Leaderboard Table */
    .leaderboard-table { background: white; border-radius: var(--border-radius-card); border: 1px solid var(--gray-200); overflow: hidden; }
    .table-header { display: flex; align-items: center; padding: 1rem 1.5rem; background: var(--gray-100); border-bottom: 1px solid var(--gray-200); font-weight: 600; color: var(--gray-600); font-size: 0.875rem; }
    .header-rank { width: 70px; }
    .header-user { flex: 1; }
    .header-points { width: 100px; text-align: right; }
    .leaderboard-row { display: flex; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid var(--gray-200); transition: 0.2s; }
    .leaderboard-row:last-child { border-bottom: none; }
    .leaderboard-row.highlight { background: #EEF2FF; border-left: 4px solid var(--primary); }
    .rank-col { width: 70px; font-weight: 700; font-size: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .rank-medal { font-size: 1.2rem; }
    .rank-number { font-weight: 700; }
    .rank-1 { color: #F59E0B; }
    .rank-2 { color: #94A3B8; }
    .rank-3 { color: #CD7F32; }
    .user-col { flex: 1; display: flex; align-items: center; gap: 0.75rem; }
    .user-avatar { width: 42px; height: 42px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1rem; flex-shrink: 0; }
    .user-name { font-weight: 600; }
    .user-school { font-size: 0.7rem; color: var(--gray-600); margin-top: 0.2rem; }
    .points-col { width: 100px; text-align: right; font-weight: 700; color: var(--primary); }
    .points-col i { margin-right: 0.25rem; }
    .empty-state { text-align: center; padding: 3rem; color: var(--gray-600); }
    .empty-state i { font-size: 3rem; margin-bottom: 1rem; display: block; }
    
    @media (max-width:768px) {
      .sidebar { transform: translateX(-100%); width:260px; }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left:0; padding:1.5rem; padding-top:4rem; }
      .hamburger { display:block; }
      .stats-grid { grid-template-columns: 1fr; gap: 0.75rem; }
      .user-rank-card { flex-direction: column; text-align: center; }
      .table-header { display: none; }
      .leaderboard-row { flex-wrap: wrap; gap: 0.75rem; }
      .rank-col { width: auto; }
      .points-col { width: auto; }
    }
  </style>
</head>
<body>
<button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <h1>🏆 Leaderboard</h1>
      <p>Lihat posisimu dan bandingkan dengan siswa lain</p>
    </div>
    
    <div id="userRankCard"></div>
    
    <div class="stats-grid" id="statsGrid"></div>
    
    <div class="tabs">
      <button class="tab-btn active" data-filter="kelas">🏫 Kelas</button>
      <button class="tab-btn" data-filter="sekolah">🏫 Sekolah</button>
      <button class="tab-btn" data-filter="nasional">🇮🇩 Nasional</button>
    </div>
    
    <div class="leaderboard-table" id="leaderboardTable"></div>
  </main>
</div>

<script>
  // Cek login
  const currentUser = JSON.parse(localStorage.getItem('currentUser'));
  if (!currentUser || currentUser.role !== 'siswa') window.location = 'login.html';
  
  let users = JSON.parse(localStorage.getItem('users')) || [];
  let students = users.filter(u => u.role === 'siswa').sort((a,b) => (b.points || 0) - (a.points || 0));
  
  // Cari peringkat user di semua level
  let allStudents = [...students];
  let kelasStudents = students.filter(s => s.jenjang === currentUser.jenjang);
  let sekolahStudents = students.filter(s => s.school === currentUser.school && s.school);
  
  let userRankAll = allStudents.findIndex(s => s.email === currentUser.email) + 1;
  let userRankKelas = kelasStudents.findIndex(s => s.email === currentUser.email) + 1;
  let userRankSekolah = sekolahStudents.findIndex(s => s.email === currentUser.email) + 1;
  
  let userPoints = currentUser.points || 0;
  
  // Tampilkan kartu peringkat user
  function getRankEmoji(rank) {
    if (rank === 1) return '👑';
    if (rank === 2) return '🥈';
    if (rank === 3) return '🥉';
    return `#${rank}`;
  }
  
  document.getElementById('userRankCard').innerHTML = `
    <div class="user-rank-card">
      <div class="user-info">
        <div class="label">Peringkat Kamu</div>
        <div class="name">${currentUser.name}</div>
        <div class="school">${currentUser.school || 'Sekolah'} • ${currentUser.jenjang || 'SD'}</div>
      </div>
      <div class="rank-info">
        <div class="rank-number">${getRankEmoji(userRankAll)}</div>
        <div class="rank-label">Nasional</div>
      </div>
      <div class="rank-info">
        <div class="rank-number">${getRankEmoji(userRankKelas)}</div>
        <div class="rank-label">${currentUser.jenjang || 'Kelas'}</div>
      </div>
      <div class="points-info">
        <div class="points"><i class="fas fa-star"></i> ${userPoints}</div>
        <div class="points-label">Total Poin</div>
      </div>
    </div>
  `;
  
  // Statistik
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="value">${allStudents.length}</div>
      <div class="label">Total Siswa</div>
    </div>
    <div class="stat-card">
      <div class="value">${kelasStudents.length}</div>
      <div class="label">Siswa ${currentUser.jenjang || 'SD'}</div>
    </div>
    <div class="stat-card">
      <div class="value">${sekolahStudents.length || '-'}</div>
      <div class="label">Siswa Sekolah</div>
    </div>
  `;
  
  function renderLeaderboard(filter = 'kelas') {
    let filteredStudents = [];
    let title = '';
    
    if (filter === 'kelas') {
      filteredStudents = students.filter(s => s.jenjang === currentUser.jenjang);
      title = `Peringkat ${currentUser.jenjang || 'SD'}`;
    } else if (filter === 'sekolah') {
      filteredStudents = students.filter(s => s.school === currentUser.school && s.school);
      title = currentUser.school ? `Peringkat ${currentUser.school}` : 'Peringkat Sekolah';
    } else {
      filteredStudents = [...students];
      title = 'Peringkat Nasional';
    }
    
    filteredStudents = filteredStudents.sort((a,b) => (b.points || 0) - (a.points || 0));
    
    if (filteredStudents.length === 0) {
      document.getElementById('leaderboardTable').innerHTML = `
        <div class="empty-state">
          <i class="fas fa-users"></i>
          <h3>Belum Ada Data</h3>
          <p>Belum ada siswa yang terdaftar untuk filter ini</p>
        </div>
      `;
      return;
    }
    
    let html = `
      <div class="table-header">
        <div class="header-rank">Peringkat</div>
        <div class="header-user">Siswa</div>
        <div class="header-points">Poin</div>
      </div>
    `;
    
    filteredStudents.forEach((s, idx) => {
      let rankDisplay = '';
      let rankClass = '';
      if (idx === 0) {
        rankDisplay = '🥇';
        rankClass = 'rank-1';
      } else if (idx === 1) {
        rankDisplay = '🥈';
        rankClass = 'rank-2';
      } else if (idx === 2) {
        rankDisplay = '🥉';
        rankClass = 'rank-3';
      } else {
        rankDisplay = `${idx+1}`;
      }
      
      let highlight = (s.email === currentUser.email) ? 'highlight' : '';
      
      // Ambil inisial nama
      let initial = s.name ? s.name.charAt(0).toUpperCase() : 'S';
      
      html += `
        <div class="leaderboard-row ${highlight}">
          <div class="rank-col">
            <span class="rank-medal ${rankClass}">${rankDisplay}</span>
          </div>
          <div class="user-col">
            <div class="user-avatar">${initial}</div>
            <div>
              <div class="user-name">${s.name}</div>
              <div class="user-school">${s.school || 'Sekolah'} • ${s.jenjang || 'SD'}</div>
            </div>
          </div>
          <div class="points-col"><i class="fas fa-star"></i> ${s.points || 0}</div>
        </div>
      `;
    });
    
    document.getElementById('leaderboardTable').innerHTML = html;
  }
  
  renderLeaderboard('kelas');
  
  // Tab event
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderLeaderboard(btn.dataset.filter);
    });
  });
  
  // Sidebar
  const sidebarHtml = `
    <div class="sidebar-header"><div class="logo-icon"><i class="fas fa-feather-alt"></i></div><div class="logo-text">LenteraNusa</div></div>
    <ul class="sidebar-menu">
      <li><a href="dashboard-user.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li><a href="modul.html"><i class="fas fa-book-open"></i> Modul Belajar</a></li>
      <li><a href="paket-kuis.html"><i class="fas fa-question-circle"></i> Kuis</a></li>
      <li><a href="pencapaian-badge.html"><i class="fas fa-medal"></i> Pencapaian</a></li>
      <li class="active"><a href="leaderboard.html"><i class="fas fa-chart-line"></i> Leaderboard</a></li>
      <li><a href="toko-hadiah.html"><i class="fas fa-gift"></i> Toko Hadiah</a></li>
      <li><a href="artikel.html"><i class="fas fa-newspaper"></i> Artikel</a></li>
      <li><a href="forum.html"><i class="fas fa-comments"></i> Forum</a></li>
      <li><a href="profil-siswa.html"><i class="fas fa-user"></i> Profil</a></li>
      <li><a href="pengaturan-siswa.html"><i class="fas fa-cog"></i> Pengaturan</a></li>
      <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Keluar</a></li>
    </ul>
  `;
  document.querySelector('.sidebar').innerHTML = sidebarHtml;
  document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.removeItem('currentUser'); window.location='login.html'; });
  
  const hamburger = document.getElementById('hamburger'), sidebar = document.getElementById('sidebar');
  hamburger.addEventListener('click', () => sidebar.classList.toggle('open'));
  document.addEventListener('click', (e) => { if (window.innerWidth <= 768 && !sidebar.contains(e.target) && !hamburger.contains(e.target)) sidebar.classList.remove('open'); });
</script>
</body>
</html>
