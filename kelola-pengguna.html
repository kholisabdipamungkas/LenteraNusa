<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kelola Pengguna | LenteraNusa Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter', sans-serif; background:#F8FAFC; color:#0F172A; }
    :root { 
      --primary:#5B21B6; 
      --primary-dark:#4C1D95; 
      --secondary:#2563EB;
      --gray-100:#F1F5F9;
      --gray-200:#E2E8F0; 
      --gray-600:#475569; 
      --gray-800:#1E293B;
      --card-bg:#FFFFFF; 
      --shadow-sm:0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md:0 4px 6px -1px rgb(0 0 0 / 0.1);
      --border-radius-card:20px;
    }
    .app { display: flex; min-height: 100vh; }
    .sidebar { 
      width:280px; background:var(--card-bg); border-right:1px solid var(--gray-200);
      position:fixed; top:0; bottom:0; left:0; z-index:50; transition:transform 0.2s ease;
      overflow-y:auto; padding:1.5rem; 
    }
    .sidebar-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:2rem; padding-bottom:1rem; border-bottom:1px solid var(--gray-200); }
    .logo-icon { background:linear-gradient(135deg,var(--primary),var(--secondary)); width:36px; height:36px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:white; }
    .logo-text { font-family:'Poppins'; font-weight:700; font-size:1.25rem; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .sidebar-menu { list-style:none; margin-top:1rem; }
    .sidebar-menu li { margin-bottom:0.25rem; }
    .sidebar-menu a { display:flex; align-items:center; gap:0.75rem; padding:0.75rem 1rem; border-radius:12px; color:var(--gray-600); font-weight:500; text-decoration:none; transition:all 0.2s; }
    .sidebar-menu a:hover { background:var(--gray-100); color:var(--primary); }
    .sidebar-menu .active a { background:#EEF2FF; color:var(--primary); }
    .sidebar-menu i { width:1.25rem; }
    .main-content { flex:1; margin-left:280px; padding:2rem; }
    .hamburger { display:none; position:fixed; top:1rem; left:1rem; z-index:60; background:white; border:none; font-size:1.5rem; padding:0.5rem; border-radius:12px; cursor:pointer; box-shadow:var(--shadow-sm); }
    
    /* Page Header */
    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-size: 1.875rem; font-weight: 600; margin-bottom: 0.5rem; }
    .page-header p { color: var(--gray-600); }
    
    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
    .stat-card { background: var(--card-bg); border-radius: var(--border-radius-card); padding: 1.5rem; box-shadow: var(--shadow-sm); border: 1px solid var(--gray-200); transition: all 0.2s; }
    .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
    .stat-icon { width: 48px; height: 48px; background: #EEF2FF; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
    .stat-icon i { font-size: 1.5rem; color: var(--primary); }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--gray-800); }
    .stat-label { font-size: 0.875rem; color: var(--gray-600); }
    
    /* Filter Bar */
    .filter-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; justify-content: space-between; align-items: center; }
    .search-wrapper { flex: 1; position: relative; max-width: 300px; }
    .search-wrapper i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--gray-600); }
    .search-input { width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; border: 1px solid var(--gray-200); border-radius: 40px; background: white; font-size: 0.875rem; transition: 0.2s; }
    .search-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(91,33,182,0.1); }
    .filter-select { padding: 0.75rem 1.5rem; border-radius: 40px; border: 1px solid var(--gray-200); background: white; font-size: 0.875rem; cursor: pointer; }
    .btn-add { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 0.75rem 1.5rem; border-radius: 40px; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 600; transition: all 0.2s; }
    .btn-add:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(91,33,182,0.3); }
    
    /* Table Styles */
    .table-container { background: white; border-radius: var(--border-radius-card); border: 1px solid var(--gray-200); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 1rem 1.25rem; text-align: left; border-bottom: 1px solid var(--gray-200); }
    th { background: var(--gray-100); font-weight: 600; color: var(--gray-600); font-size: 0.875rem; }
    td { color: var(--gray-800); font-size: 0.875rem; }
    tr:hover td { background: var(--gray-100); }
    .btn-edit, .btn-delete { padding: 0.5rem 0.75rem; border-radius: 8px; text-decoration: none; margin: 0 0.25rem; display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.75rem; font-weight: 500; transition: all 0.2s; border: none; cursor: pointer; }
    .btn-edit { background: #EEF2FF; color: var(--primary); }
    .btn-edit:hover { background: var(--primary); color: white; transform: translateY(-2px); }
    .btn-delete { background: #FEF2F2; color: #EF4444; }
    .btn-delete:hover { background: #EF4444; color: white; transform: translateY(-2px); }
    .badge-status { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.7rem; font-weight: 600; display: inline-block; }
    .status-aktif { background: #D1FAE5; color: #065F46; }
    .status-tidak-aktif { background: #FEE2E2; color: #991B1B; }
    
    /* Empty State */
    .empty-state { text-align: center; padding: 3rem; color: var(--gray-600); }
    .empty-state i { font-size: 3rem; color: var(--gray-600); margin-bottom: 1rem; display: block; }
    
    /* Pagination */
    .pagination { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1.5rem; }
    .page-btn { padding: 0.5rem 0.75rem; border-radius: 8px; background: var(--gray-100); color: var(--gray-600); text-decoration: none; font-size: 0.875rem; transition: 0.2s; cursor: pointer; }
    .page-btn:hover { background: var(--primary); color: white; }
    .page-btn.active { background: var(--primary); color: white; }
    
    /* Quick Actions */
    .quick-actions { margin-top: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; }
    .btn-action { background: var(--gray-100); padding: 0.5rem 1rem; border-radius: 40px; text-decoration: none; color: var(--gray-600); font-size: 0.8rem; transition: 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; }
    .btn-action:hover { background: var(--primary); color: white; }
    
    /* User Avatar */
    .user-avatar { width: 32px; height: 32px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem; font-weight: 600; margin-right: 0.5rem; }
    
    @media (max-width: 1024px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    }
    
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); width:260px; }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left:0; padding:1.5rem; padding-top:4rem; }
      .hamburger { display:block; }
      .stats-grid { grid-template-columns: 1fr; }
      .filter-bar { flex-direction: column; align-items: stretch; }
      .search-wrapper { max-width: none; }
      .table-container { overflow-x: auto; }
      table { font-size: 0.75rem; }
      th, td { padding: 0.75rem; }
      .btn-edit, .btn-delete { padding: 0.35rem 0.5rem; }
    }
  </style>
</head>
<body>
<button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <h1>👥 Kelola Pengguna</h1>
      <p>Tambah, edit, atau hapus akun pengguna</p>
    </div>
    
    <!-- Statistik -->
    <div class="stats-grid" id="statsGrid"></div>
    
    <!-- Filter & Tombol Tambah -->
    <div class="filter-bar">
      <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" id="searchUser" class="search-input" placeholder="Cari pengguna...">
      </div>
      <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
        <select id="jenjangFilter" class="filter-select">
          <option value="">🎓 Semua Jenjang</option>
          <option value="SD">SD</option>
          <option value="SMP">SMP</option>
          <option value="SMA">SMA</option>
        </select>
        <select id="statusFilter" class="filter-select">
          <option value="">📊 Semua Status</option>
          <option value="aktif">✅ Aktif (Poin > 0)</option>
          <option value="tidak-aktif">⭕ Tidak Aktif (Poin = 0)</option>
        </select>
        <a href="tambah-pengguna.html" class="btn-add"><i class="fas fa-plus"></i> Tambah Pengguna</a>
      </div>
    </div>
    
    <!-- Tabel Pengguna -->
    <div class="table-container">
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>No</th>
              <th>Nama</th>
              <th>Email</th>
              <th>Jenjang</th>
              <th>Sekolah</th>
              <th>Poin</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="userList"></tbody>
        </table>
      </div>
    </div>
    
    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>
    
    <!-- Quick Actions -->
    <div class="quick-actions">
      <a href="dashboard-admin.html" class="btn-action"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="analitik.html" class="btn-action"><i class="fas fa-chart-pie"></i> Analitik</a>
      <a href="kelola-transaksi.html" class="btn-action"><i class="fas fa-credit-card"></i> Kelola Transaksi</a>
      <a href="kelola-modul.html" class="btn-action"><i class="fas fa-book"></i> Kelola Modul</a>
    </div>
  </main>
</div>

<script>
  (function() {
    // Cek login admin
    var currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!currentUser || currentUser.role !== 'admin') {
      window.location = 'login.html';
      return;
    }
    
    // Ambil data pengguna
    var users = JSON.parse(localStorage.getItem('users')) || [];
    var students = users.filter(function(u) { return u.role === 'siswa'; });
    var admins = users.filter(function(u) { return u.role === 'admin'; });
    
    // Variabel untuk pagination dan filter
    var currentPage = 1;
    var itemsPerPage = 5;
    var currentSearch = '';
    var currentJenjang = '';
    var currentStatus = '';
    
    // Hitung statistik
    var totalStudents = students.length;
    var totalAdmins = admins.length;
    var activeStudents = students.filter(function(s) { return (s.points || 0) > 0; }).length;
    var totalPoints = students.reduce(function(sum, s) { return sum + (s.points || 0); }, 0);
    
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-users"></i></div>
        <div class="stat-value">${totalStudents}</div>
        <div class="stat-label">Total Siswa</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-user-shield"></i></div>
        <div class="stat-value">${totalAdmins}</div>
        <div class="stat-label">Total Admin</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-user-check"></i></div>
        <div class="stat-value">${activeStudents}</div>
        <div class="stat-label">Siswa Aktif</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-coins"></i></div>
        <div class="stat-value">${totalPoints.toLocaleString()}</div>
        <div class="stat-label">Total Poin</div>
      </div>
    `;
    
    // Fungsi untuk mendapatkan inisial nama
    function getInitial(name) {
      return name ? name.charAt(0).toUpperCase() : 'S';
    }
    
    // Fungsi filter pengguna
    function getFilteredUsers() {
      return students.filter(function(user) {
        var matchSearch = currentSearch === '' || 
          user.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
          user.email.toLowerCase().includes(currentSearch.toLowerCase());
        var matchJenjang = currentJenjang === '' || user.jenjang === currentJenjang;
        var matchStatus = true;
        if (currentStatus === 'aktif') matchStatus = (user.points || 0) > 0;
        if (currentStatus === 'tidak-aktif') matchStatus = (user.points || 0) === 0;
        return matchSearch && matchJenjang && matchStatus;
      });
    }
    
    // Fungsi render tabel dengan pagination
    function renderUsers() {
      var filtered = getFilteredUsers();
      var totalPages = Math.ceil(filtered.length / itemsPerPage);
      var start = (currentPage - 1) * itemsPerPage;
      var paginatedUsers = filtered.slice(start, start + itemsPerPage);
      
      var html = '';
      if (paginatedUsers.length === 0) {
        html = '<tr><td colspan="8" class="empty-state"><i class="fas fa-user-slash"></i>Tidak ada pengguna</td></tr>';
      } else {
        for (var i = 0; i < paginatedUsers.length; i++) {
          var user = paginatedUsers[i];
          var statusClass = (user.points || 0) > 0 ? 'status-aktif' : 'status-tidak-aktif';
          var statusText = (user.points || 0) > 0 ? 'Aktif' : 'Tidak Aktif';
          var initial = getInitial(user.name);
          
          html += `
            <tr>
              <td>${start + i + 1}</td>
              <td>
                <span class="user-avatar">${initial}</span>
                ${escapeHtml(user.name)}
              </td>
              <td>${escapeHtml(user.email)}</td>
              <td>${escapeHtml(user.jenjang || 'SD')}</td>
              <td>${escapeHtml(user.school || '-')}</td>
              <td><i class="fas fa-star" style="color: var(--primary);"></i> ${user.points || 0}</td>
              <td><span class="badge-status ${statusClass}">${statusText}</span></td>
              <td>
                <button class="btn-edit" data-email="${user.email}"><i class="fas fa-edit"></i> Edit</button>
                <button class="btn-delete" data-email="${user.email}"><i class="fas fa-trash"></i> Hapus</button>
              </td>
            </tr>
          `;
        }
      }
      document.getElementById('userList').innerHTML = html;
      
      // Render pagination
      renderPagination(totalPages);
      
      // Event listener untuk tombol edit
      var editBtns = document.querySelectorAll('.btn-edit');
      for (var j = 0; j < editBtns.length; j++) {
        editBtns[j].addEventListener('click', function() {
          var email = this.getAttribute('data-email');
          window.location.href = 'tambah-pengguna.html?email=' + encodeURIComponent(email);
        });
      }
      
      // Event listener untuk tombol hapus
      var deleteBtns = document.querySelectorAll('.btn-delete');
      for (var k = 0; k < deleteBtns.length; k++) {
        deleteBtns[k].addEventListener('click', function() {
          var email = this.getAttribute('data-email');
          if (confirm('Apakah Anda yakin ingin menghapus pengguna ini? Tindakan ini tidak dapat dibatalkan.')) {
            users = users.filter(function(u) { return u.email !== email; });
            localStorage.setItem('users', JSON.stringify(users));
            if (currentUser.email === email) {
              localStorage.removeItem('currentUser');
              window.location = 'login.html';
            } else {
              // Update students array
              students = users.filter(function(u) { return u.role === 'siswa'; });
              if (getFilteredUsers().length === 0 && currentPage > 1) {
                currentPage = 1;
              }
              renderUsers();
              // Update statistik
              updateStats();
            }
          }
        });
      }
    }
    
    function updateStats() {
      var newStudents = users.filter(function(u) { return u.role === 'siswa'; });
      var newAdmins = users.filter(function(u) { return u.role === 'admin'; });
      var newActiveStudents = newStudents.filter(function(s) { return (s.points || 0) > 0; }).length;
      var newTotalPoints = newStudents.reduce(function(sum, s) { return sum + (s.points || 0); }, 0);
      
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-users"></i></div>
          <div class="stat-value">${newStudents.length}</div>
          <div class="stat-label">Total Siswa</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-user-shield"></i></div>
          <div class="stat-value">${newAdmins.length}</div>
          <div class="stat-label">Total Admin</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-user-check"></i></div>
          <div class="stat-value">${newActiveStudents}</div>
          <div class="stat-label">Siswa Aktif</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-coins"></i></div>
          <div class="stat-value">${newTotalPoints.toLocaleString()}</div>
          <div class="stat-label">Total Poin</div>
        </div>
      `;
    }
    
    function renderPagination(totalPages) {
      var paginationDiv = document.getElementById('pagination');
      if (totalPages <= 1) {
        paginationDiv.innerHTML = '';
        return;
      }
      
      var html = '';
      // Tombol Previous
      if (currentPage > 1) {
        html += '<a class="page-btn" data-page="' + (currentPage - 1) + '"><i class="fas fa-chevron-left"></i></a>';
      }
      
      // Nomor halaman
      for (var i = 1; i <= totalPages; i++) {
        if (i === currentPage) {
          html += '<span class="page-btn active">' + i + '</span>';
        } else if (Math.abs(i - currentPage) <= 2 || i === 1 || i === totalPages) {
          html += '<a class="page-btn" data-page="' + i + '">' + i + '</a>';
        } else if (i === currentPage - 3 || i === currentPage + 3) {
          html += '<span class="page-btn">...</span>';
        }
      }
      
      // Tombol Next
      if (currentPage < totalPages) {
        html += '<a class="page-btn" data-page="' + (currentPage + 1) + '"><i class="fas fa-chevron-right"></i></a>';
      }
      
      paginationDiv.innerHTML = html;
      
      // Event listener untuk pagination
      var pageBtns = document.querySelectorAll('.page-btn[data-page]');
      for (var j = 0; j < pageBtns.length; j++) {
        pageBtns[j].addEventListener('click', function(e) {
          e.preventDefault();
          currentPage = parseInt(this.getAttribute('data-page'));
          renderUsers();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      }
    }
    
    function escapeHtml(text) {
      if (!text) return '';
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Event listener untuk filter dan search
    var searchInput = document.getElementById('searchUser');
    var jenjangSelect = document.getElementById('jenjangFilter');
    var statusSelect = document.getElementById('statusFilter');
    
    if (searchInput) {
      searchInput.addEventListener('input', function(e) {
        currentSearch = e.target.value;
        currentPage = 1;
        renderUsers();
      });
    }
    
    if (jenjangSelect) {
      jenjangSelect.addEventListener('change', function(e) {
        currentJenjang = e.target.value;
        currentPage = 1;
        renderUsers();
      });
    }
    
    if (statusSelect) {
      statusSelect.addEventListener('change', function(e) {
        currentStatus = e.target.value;
        currentPage = 1;
        renderUsers();
      });
    }
    
    // Render awal
    renderUsers();
    
    // Sidebar HTML lengkap
    var sidebarHtml = `
      <div class="sidebar-header">
        <div class="logo-icon"><i class="fas fa-feather-alt"></i></div>
        <div class="logo-text">LenteraNusa</div>
        <small style="margin-left:auto; font-size:10px; color:var(--primary);">Admin</small>
      </div>
      <ul class="sidebar-menu">
        <li><a href="dashboard-admin.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
        <li><a href="analitik.html"><i class="fas fa-chart-pie"></i> Analitik</a></li>
        <li><a href="kelola-artikel.html"><i class="fas fa-newspaper"></i> Kelola Artikel</a></li>
        <li><a href="kelola-produk.html"><i class="fas fa-gift"></i> Kelola Produk</a></li>
        <li class="active"><a href="kelola-pengguna.html"><i class="fas fa-users"></i> Kelola Pengguna</a></li>
        <li><a href="kelola-transaksi.html"><i class="fas fa-credit-card"></i> Kelola Transaksi</a></li>
        <li><a href="kelola-modul.html"><i class="fas fa-book"></i> Kelola Modul</a></li>
        <li><a href="kelola-badge.html"><i class="fas fa-medal"></i> Kelola Badge</a></li>
        <li><a href="kelola-forum.html"><i class="fas fa-comments"></i> Kelola Forum</a></li>
        <li><a href="kelola-kuis.html"><i class="fas fa-question-circle"></i> Kelola Kuis</a></li>
        <li><a href="profil-admin.html"><i class="fas fa-user-shield"></i> Profil</a></li>
        <li><a href="pengaturan-admin.html"><i class="fas fa-cog"></i> Pengaturan</a></li>
        <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Keluar</a></li>
      </ul>
    `;
    
    var sidebar = document.querySelector('.sidebar');
    if (sidebar) sidebar.innerHTML = sidebarHtml;
    
    // Logout
    var logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
      logoutBtn.addEventListener('click', function() { 
        localStorage.removeItem('currentUser'); 
        window.location = 'login.html'; 
      });
    }
    
    // Hamburger menu
    var hamburger = document.getElementById('hamburger');
    var sidebarElement = document.getElementById('sidebar');
    if (hamburger && sidebarElement) {
      hamburger.addEventListener('click', function() { 
        sidebarElement.classList.toggle('open'); 
      });
    }
    
    // Tutup sidebar saat klik di luar (mobile)
    document.addEventListener('click', function(e) {
      if (window.innerWidth <= 768) {
        if (sidebarElement && hamburger && !sidebarElement.contains(e.target) && !hamburger.contains(e.target)) {
          sidebarElement.classList.remove('open');
        }
      }
    });
  })();
</script>
</body>
</html>
